<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TripLite">
  <meta name="format-detection" content="telephone=no,email=no,address=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>地图路线 · TripLite</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"></noscript>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-icon">✈️</span>
        <span class="brand-name">TripLite</span>
      </div>
      <div class="header-meta" id="headerDate"></div>
    </div>
  </header>

  <main class="app-main" id="appMain"></main>

  <nav class="bottom-nav">
    <a href="index.html"    class="nav-item"><i class="fas fa-home"></i><span>首页</span></a>
    <a href="trip.html"     class="nav-item"><i class="fas fa-route"></i><span>行程</span></a>
    <a href="map.html"      class="nav-item active"><i class="fas fa-map-marker-alt"></i><span>地图</span></a>
    <a href="checklist.html" class="nav-item"><i class="fas fa-check-square"></i><span>清单</span></a>
    <a href="weather.html"  class="nav-item"><i class="fas fa-cloud-sun"></i><span>天气</span></a>
    <a href="emergency.html" class="nav-item"><i class="fas fa-shield-alt"></i><span>应急</span></a>
  </nav>

  <script src="js/data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    var leafletMap = null;
    var currentCity = 'all';
    var markers = [];

    function renderMapPage() {
      var main = document.getElementById('appMain');
      main.innerHTML =
        '<div class="page-header">'
        + '<div class="page-header-title">🗺️ 地图路线</div>'
        + '<div class="page-header-sub">关键地点 · 路线指引 · 交通建议</div>'
        + '</div>'
        + '<div class="city-tabs">'
        + '<button class="city-chip active" onclick="switchMapCity(\'all\', this)">🌏 总览</button>'
        + '<button class="city-chip" onclick="switchMapCity(\'macau\', this)">🎰 澳门</button>'
        + '<button class="city-chip" onclick="switchMapCity(\'pattaya\', this)">🏖️ 芭提雅</button>'
        + '<button class="city-chip" onclick="switchMapCity(\'bangkok\', this)">🏙️ 曼谷</button>'
        + '</div>'
        + '<div class="map-container"><div id="leafletMap"></div></div>'
        + '<div class="card" style="margin-bottom:12px;padding:10px 14px;">'
        + '<div style="font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;">地图图例</div>'
        + '<div style="display:flex;flex-wrap:wrap;gap:8px;">'
        + '<span style="font-size:11px;display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:#f59e0b;display:inline-block;"></span>景点</span>'
        + '<span style="font-size:11px;display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:#10b981;display:inline-block;"></span>住宿</span>'
        + '<span style="font-size:11px;display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:#3b82f6;display:inline-block;"></span>交通</span>'
        + '<span style="font-size:11px;display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:#ef4444;display:inline-block;"></span>美食</span>'
        + '<span style="font-size:11px;display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:#ec4899;display:inline-block;"></span>购物</span>'
        + '<span style="font-size:11px;display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:#14b8a6;display:inline-block;"></span>按摩</span>'
        + '<span style="font-size:11px;display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:#8b5cf6;display:inline-block;"></span>夜生活</span>'
        + '</div></div>'
        + '<div id="routeSection"></div>'
        + '<div class="section-label" id="poisLabel">全部关键地点</div>'
        + '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;padding:0 2px;">点击卡片可在地图上高亮显示该地点</div>'
        + '<div id="poisList"></div>'
        + '<div class="safe-bottom"></div>';
      
      initMap();
      renderPois('all');
      renderRoutes('all');
    }
    
    function initMap() {
      if (leafletMap) {
        leafletMap.remove();
        leafletMap = null;
      }
      
      leafletMap = L.map('leafletMap', {
        center: [13.7563, 100.5018],
        zoom: 5,
        zoomControl: true,
        attributionControl: false
      });
      
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18
      }).addTo(leafletMap);
      
      addMarkers('all');
    }
    
    function addMarkers(city) {
      var mi;
      for (mi = 0; mi < markers.length; mi++) markers[mi].remove();
      markers = [];
      
      var allPois_m = MAP_DATA.pois;
      var filtered = [];
      if (city === 'all') {
        filtered = allPois_m;
      } else {
        for (var fi_m = 0; fi_m < allPois_m.length; fi_m++) {
          if (allPois_m[fi_m].city === city) filtered.push(allPois_m[fi_m]);
        }
      }
      var pi_m, poi_m, iconHtml_m, icon_m, marker_m;
      for (pi_m = 0; pi_m < filtered.length; pi_m++) {
        poi_m = filtered[pi_m];
        iconHtml_m = '<div style="background:white;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,0.25);border:2px solid ' + getPoiColor(poi_m.type) + ';">' + poi_m.emoji + '</div>';
        icon_m = L.divIcon({
          html: iconHtml_m,
          className: '',
          iconSize: [36, 36],
          iconAnchor: [18, 18]
        });
        var popupHtml_m = '<div style="font-family:sans-serif;min-width:160px;">'
          + '<div style="font-size:15px;font-weight:700;margin-bottom:4px;">' + poi_m.emoji + ' ' + poi_m.name + '</div>'
          + '<div style="font-size:12px;color:#666;margin-bottom:6px;">' + poi_m.address + '</div>'
          + '<div style="font-size:12px;color:#1e40af;background:#dbeafe;padding:4px 8px;border-radius:6px;">' + poi_m.tip + '</div>'
          + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;">'
          + '<a href="https://uri.amap.com/marker?position=' + poi_m.lng + ',' + poi_m.lat + '&name=' + encodeURIComponent(poi_m.name) + '&coordinate=gaode&callnative=1" target="_blank" style="background:#00b7ff;color:white;text-align:center;padding:7px 4px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;">\uD83D\uDCCD \u9AD8\u5FB7\u5BFC\u822A</a>'
          + '<a href="https://maps.google.com/?q=' + poi_m.lat + ',' + poi_m.lng + '" target="_blank" style="background:#4285f4;color:white;text-align:center;padding:7px 4px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;">\uD83D\uDDFA\uFE0F \u8C37\u6B4C\u5730\u56FE</a>'
          + '</div></div>';
        marker_m = L.marker([poi_m.lat, poi_m.lng], { icon: icon_m })
          .addTo(leafletMap)
          .bindPopup(popupHtml_m);
        markers.push(marker_m);
      }
      
      if (filtered.length > 0) {
        var group_m = L.featureGroup(markers);
        leafletMap.fitBounds(group_m.getBounds().pad(0.2));
      }
    }
    
    function getPoiColor(type) {
      var colors = {
        attraction: '#f59e0b',
        stay: '#10b981',
        transport: '#3b82f6',
        food: '#ef4444',
        nightlife: '#8b5cf6',
        shopping: '#ec4899',
        massage: '#14b8a6'
      };
      return colors[type] || '#64748b';
    }
    
    function switchMapCity(city, btn) {
      currentCity = city;
      var allChipsM = document.querySelectorAll('.city-chip');
      for (var ciM = 0; ciM < allChipsM.length; ciM++) allChipsM[ciM].classList.remove('active');
      btn.classList.add('active');
      
      addMarkers(city);
      renderPois(city);
      renderRoutes(city);
      
      var label = document.getElementById('poisLabel');
      if (label) {
        var names = { all: '全部关键地点', macau: '澳门关键地点', bangkok: '曼谷关键地点', pattaya: '芭提雅关键地点' };
        label.textContent = names[city] || '关键地点';
      }
    }
    
    function renderPois(city) {
      var list = document.getElementById('poisList');
      if (!list) return;
      
      var allPois_r = MAP_DATA.pois;
      var filtered = [];
      if (city === 'all') {
        filtered = allPois_r;
      } else {
        for (var fi_r = 0; fi_r < allPois_r.length; fi_r++) {
          if (allPois_r[fi_r].city === city) filtered.push(allPois_r[fi_r]);
        }
      }
      var typeLabels = {
        attraction: '🎯 景点',
        stay: '🏨 住宿',
        transport: '🚌 交通',
        food: '🍜 美食',
        nightlife: '🌃 夜生活',
        shopping: '🛍️ 购物',
        massage: '💆 按摩'
      };
      
      var poisHtml = '';
      var pii, poi_r;
      for (pii = 0; pii < filtered.length; pii++) {
        poi_r = filtered[pii];
        var officialBtn = poi_r.officialUrl ? '<a href="' + poi_r.officialUrl + '" target="_blank" class="poi-action-btn" onclick="event.stopPropagation()"><i class="fas fa-external-link-alt"></i> 官网</a>' : '';
        poisHtml += '<div class="poi-card" data-lat="' + poi_r.lat + '" data-lng="' + poi_r.lng + '" data-id="' + poi_r.id + '" onclick="focusPoi(' + poi_r.lat + ', ' + poi_r.lng + ', \'' + poi_r.id + '\')">'  
          + '<div class="poi-emoji">' + poi_r.emoji + '</div>'
          + '<div class="poi-info">'
          + '<div class="poi-name">' + poi_r.name + '</div>'
          + '<div class="poi-addr">' + poi_r.address + '</div>'
          + '<div style="margin-bottom:4px;"><span class="tag ' + getPoiTagClass(poi_r.type) + '" style="font-size:10px;">' + (typeLabels[poi_r.type] || poi_r.type) + '</span></div>'
          + '<div style="font-size:12px;color:var(--text-secondary);background:var(--bg);padding:6px 8px;border-radius:6px;line-height:1.5;">💡 ' + poi_r.tip + '</div>'
          + '<div class="poi-actions" style="margin-top:8px;flex-wrap:wrap;gap:6px;">'
          + '<a href="https://uri.amap.com/marker?position=' + poi_r.lng + ',' + poi_r.lat + '&name=' + encodeURIComponent(poi_r.name) + '&coordinate=gaode&callnative=1" target="_blank" class="poi-action-btn" style="background:#00b7ff;color:white;border:none;text-decoration:none;" onclick="event.stopPropagation()">📍 高德</a>'
          + '<a href="https://maps.google.com/?q=' + poi_r.lat + ',' + poi_r.lng + '" target="_blank" class="poi-action-btn" style="background:#4285f4;color:white;border:none;text-decoration:none;" onclick="event.stopPropagation()">🗺️ 谷歌</a>'
          + '<button class="poi-action-btn" data-addr="' + poi_r.address.replace(/"/g, '&quot;') + '" onclick="event.stopPropagation();copyToClipboard(this.dataset.addr)"><i class="fas fa-copy"></i> 复制</button>'
          + officialBtn
          + '</div></div></div>';
      }
      list.innerHTML = poisHtml;
    }
    
    function getPoiTagClass(type) {
      var classes = {
        attraction: 'amber',
        stay: 'green',
        transport: 'blue',
        food: 'red',
        nightlife: 'purple',
        shopping: 'purple',
        massage: 'green'
      };
      return classes[type] || 'gray';
    }
    
    function renderRoutes(city) {
      var section = document.getElementById('routeSection');
      if (!section) return;
      
      var allRoutes = MAP_DATA.routes;
      var filtered = [];
      if (city === 'all') {
        filtered = allRoutes;
      } else {
        for (var ri_f = 0; ri_f < allRoutes.length; ri_f++) {
          if (allRoutes[ri_f].city === city) filtered.push(allRoutes[ri_f]);
        }
      }
      
      if (filtered.length === 0) {
        section.innerHTML = '';
        return;
      }
      
      var routeHtml = '<div class="section-label">推荐路线</div>';
      var ri2, route, si, s;
      for (ri2 = 0; ri2 < filtered.length; ri2++) {
        route = filtered[ri2];
        routeHtml += '<div class="route-card"><div class="route-title">' + route.emoji + ' ' + route.title + '</div><div class="route-steps">';
        for (si = 0; si < route.steps.length; si++) {
          s = route.steps[si];
          routeHtml += '<div class="route-step"><div class="route-step-num">' + (si + 1) + '</div><div class="route-step-info">';
          routeHtml += '<div class="route-step-name">' + s.name + '</div>';
          routeHtml += '<div class="route-step-desc">' + s.desc + '</div>';
          if (s.transport) routeHtml += '<span class="route-transport">' + s.transport + '</span>';
          routeHtml += '</div></div>';
        }
        routeHtml += '</div></div>';
      }
      section.innerHTML = routeHtml;
    }
    
    function focusPoi(lat, lng, id) {
      if (leafletMap) {
        try {
          leafletMap.setView([lat, lng], 15);
          for (var mi2 = 0; mi2 < markers.length; mi2++) {
            var latlng = markers[mi2].getLatLng();
            if (latlng.lat === lat && latlng.lng === lng) { markers[mi2].openPopup(); }
          }
        } catch(e) {}
      }
      try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch(e) { window.scrollTo(0, 0); }
    }
    
    function openNav(url) {
      window.open(url, '_blank');
    }
    
    // 重要地点快捷卡
    function renderQuickPois() {
      // 城市页面特有内容已在renderPois中处理
    }

    document.addEventListener('DOMContentLoaded', function() {
      renderMapPage();
      var now = new Date();
      var headerDate = document.getElementById('headerDate');
      if (headerDate) headerDate.textContent = (now.getMonth()+1) + '月' + now.getDate() + '日';
    });
  </script>

  <!-- 涂鸦悬浮按钮 -->
  <a href="note.html" class="note-fab" title="涂鸦记录">✏️</a>
</body>
</html>

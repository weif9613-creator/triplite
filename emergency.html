<body>

      </div>

    </div>
  </header>

  <main class="app-main" id="appMain"></main>

  <nav class="bottom-nav">

    <a href="trip.html"      class="nav-item"><i class="fas fa-route"></i><span>行程</span></a>

  </nav>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    function renderEmergencyPage() {
      var main = document.getElementById('appMain');
      if (!main) return;
      var h = '';
      h += '<div class="page-header">';
      h += '<div class="page-header-title">&#x1F6E1;&#xFE0F; &#x5E94;&#x6025;&#x5E2E;&#x52A9;</div>';
      h += '<div class="page-header-sub">&#x51FA;&#x95EE;&#x9898;&#x65F6;&#x8BE5;&#x770B;&#x54EA; &middot; &#x7D27;&#x6025;&#x8054;&#x7CFB; &middot; &#x5B9E;&#x7528;&#x5EFA;&#x8BAE;</div>';
      h += '</div>';

      h += '<div class="card" style="margin-bottom:14px;border:2px solid #fecaca;">';
      h += '<div class="card-title" style="margin-bottom:12px;color:var(--danger);"><span class="icon">&#x1F198;</span>&#x7D27;&#x6025;&#x7535;&#x8BDD;&#xFF08;&#x70B9;&#x51FB;&#x76F4;&#x63A5;&#x62E8;&#x6253;&#xFF09;</div>';
      h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
      h += '<a href="tel:+6622457010" class="emergency-phone" style="justify-content:center;"><span>&#x1F1E8;&#x1F1F3;</span> &#x4E2D;&#x56FD;&#x4F7F;&#x9986;&#xFF0824h&#xFF09;</a>';
      h += '<a href="tel:1155" class="emergency-phone" style="justify-content:center;"><span>&#x1F46E;</span> &#x65C5;&#x6E38;&#x8B66;&#x5BDF; 1155</a>';
      h += '<a href="tel:1669" class="emergency-phone" style="justify-content:center;"><span>&#x1F691;</span> &#x6025;&#x6551;&#x8F66; 1669</a>';
      h += '<a href="tel:191" class="emergency-phone" style="justify-content:center;"><span>&#x1F694;</span> &#x8B66;&#x5BDF;&#x62A5;&#x8B66; 191</a>';
      h += '</div>';
      h += '<div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
      h += '<a href="tel:+66382599999" class="emergency-phone" style="justify-content:center;background:var(--success-bg,#dcfce7);border:1px solid #86efac;"><span>&#x1F3E5;</span> &#x82AD;&#x63D0;&#x96C5;&#x533B;&#x9662;</a>';
      h += '<a href="tel:+6620668888" class="emergency-phone" style="justify-content:center;background:var(--success-bg,#dcfce7);border:1px solid #86efac;"><span>&#x1F3E5;</span> &#x66FC;&#x8C37;&#x5EB7;&#x6C11;&#x533B;&#x9662;</a>';
      h += '</div>';
      h += '<div style="font-size:11px;color:var(--text-muted);margin-top:8px;text-align:center;">&#x70B9;&#x51FB;&#x53EF;&#x76F4;&#x63A5;&#x62E8;&#x6253; &middot; &#x4EC5;&#x5728;&#x6CF0;&#x56FD;&#x6709;&#x6548; &middot; &#x533B;&#x9662;&#x6709;&#x4E2D;&#x6587;&#x670D;&#x52A1;</div>';
      h += '</div>';

      h += '<div id="emergency-sections"></div>';

      h += '<div class="card" style="margin-top:8px;">';
      h += '<div class="card-title" style="margin-bottom:12px;"><span class="icon">&#x1F4CB;</span>&#x51FA;&#x53D1;&#x524D;&#x5FC5;&#x987B;&#x5907;&#x4EFD;&#x5230;&#x624B;&#x673A;&#x7684;&#x4FE1;&#x606F;</div>';
      h += '<div style="display:flex;flex-direction:column;gap:6px;">';
      var backupItems = [
        ['&#10003; &#x62A4;&#x7167;&#x9996;&#x9875;&#x7167;&#x7247;', '&#x62A4;&#x7167;&#x53F7;&#x3001;&#x6709;&#x6548;&#x671F;&#x3001;&#x7B7E;&#x8BC1;&#x9875;'],
        ['&#10003; &#x673A;&#x7968;&#x8BA2;&#x5355;&#x622A;&#x56FE;', '&#x822A;&#x73ED;&#x53F7;&#x3001;&#x65F6;&#x95F4;&#x3001;&#x5EA7;&#x4F4D;&#x53F7;'],
        ['&#10003; &#x9152;&#x5E97;&#x786E;&#x8BA4;&#x51FD;',         '&#x5730;&#x5740;&#x3001;&#x5165;&#x4F4F;&#x65E5;&#x671F;'],
        ['&#10003; &#x65C5;&#x884C;&#x4FDD;&#x9669;&#x5355;',         '&#x7406;&#x8D54;&#x7535;&#x8BDD;&#x3001;&#x4FDD;&#x5355;&#x53F7;'],
        ['&#10003; &#x5BB6;&#x4EBA;&#x8054;&#x7CFB;&#x65B9;&#x5F0F;', '&#x7D27;&#x6025;&#x8054;&#x7CFB;&#x4EBA;&#x7535;&#x8BDD;']
      ];
      for (var bi = 0; bi < backupItems.length; bi++) {
        h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);">';
        h += '<div style="font-size:13px;font-weight:600;color:var(--text-primary);">' + backupItems[bi][0] + '</div>';
        h += '<div style="font-size:11px;color:var(--text-muted);">' + backupItems[bi][1] + '</div>';
        h += '</div>';
      }
      h += '</div></div>';

      h += '<div class="card" style="margin-top:8px;">';
      h += '<div class="card-title" style="margin-bottom:12px;"><span class="icon">&#x1F1F9;&#x1F1ED;</span>&#x6CF0;&#x8BED;&#x5E94;&#x6025;&#x77ED;&#x53E5;</div>';
      h += '<div id="thai-phrases-inline" style="display:flex;flex-direction:column;gap:6px;"></div>';
      h += '</div>';

      h += '<div class="safe-bottom"></div>';
      main.innerHTML = h;
    }

    function renderEmergencyItem(item) {
      return '<div class="emergency-item">'
        + '<div class="emergency-icon">' + item.icon + '</div>'
        + '<div class="emergency-content">'
        + '<div class="emergency-title">' + item.title + '</div>'
        + '<div class="emergency-text" style="white-space:pre-line;">' + item.text + '</div>'
        + '</div></div>';
    }

    function copyToClipboard(text) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text);
        } else {
          var ta = document.createElement('textarea');
          ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
      } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', function() {
      renderEmergencyPage();

      var sectionsEl = document.getElementById('emergency-sections');
      if (sectionsEl && typeof EMERGENCY_DATA !== 'undefined') {
        var sectHtml = '';
        for (var si = 0; si < EMERGENCY_DATA.length; si++) {
          var section = EMERGENCY_DATA[si];
          sectHtml += '<div class="emergency-section"><div class="section-label">' + section.title + '</div>';
          for (var ii = 0; ii < section.items.length; ii++) {
            sectHtml += renderEmergencyItem(section.items[ii]);
          }
          sectHtml += '</div>';
        }
        sectionsEl.innerHTML = sectHtml;
      }

      var thaiPhrases = [
        { th: 'ช่วยด้วย（Chuay duay）', cn: '救命/帮帮我' },
        { th: 'ไปโรงพยาบาล（Pai rong phayaban）', cn: '去医院' },
        { th: 'โทรตำรวจ（Tho tamruat）', cn: '打电话叫警察' },
        { th: 'หนังสือเดินทางหาย（Nangsu doenthang haai）', cn: '护照丢了' },
        { th: 'ฉันไม่สบาย（Chan mai sabai）', cn: '我不舒服/生病了' },
        { th: 'เท่าไหร่（Thao rai）', cn: '多少钱' },
        { th: 'ไม่เอา（Mai ao）', cn: '不要了/不需要' },
        { th: 'ขอบคุณ（Khob khun）', cn: '谢谢' },
        { th: 'ขอโทษ（Kho thot）', cn: '对不起/打扰了' },
        { th: 'ไม่เผ็ด（Mai phet）', cn: '不辣（点餐必备）' },
        { th: 'เรียกแท็กซี่（Riak taeksi）', cn: '叫出租车' },
        { th: 'โรงแรมอยู่ที่ไหน（Rongraem yu thi nai）', cn: '酒店在哪里' },
        { th: 'หยุด（Yut）', cn: '停（告诉司机停车）' },
        { th: 'ห้องน้ำอยู่ที่ไหน（Hong nam yu thi nai）', cn: '厕所在哪里' }
      ];
      var phrasesEl = document.getElementById('thai-phrases-inline');
      if (phrasesEl) {
        var pHtml = '';
        for (var pi = 0; pi < thaiPhrases.length; pi++) {
          var ph = thaiPhrases[pi];
          pHtml += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);">'
            + '<div><div style="font-size:13px;font-weight:600;color:var(--primary-light);">' + ph.th + '</div>'
            + '<div style="font-size:12px;color:var(--text-secondary);">' + ph.cn + '</div></div>'
            + '<button onclick="copyToClipboard(this.dataset.text)" data-text="' + ph.th.replace(/"/g, '&quot;') + '" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--text-muted);cursor:pointer;">复制</button>'
            + '</div>';
        }
        phrasesEl.innerHTML = pHtml;
      }

      var now = new Date();
      var headerDate = document.getElementById('headerDate');
      if (headerDate) headerDate.textContent = (now.getMonth()+1) + '月' + now.getDate() + '日';
    });
  </script>

  <!-- 涂鸦悬浮按钮 -->
  <a href="note.html" class="note-fab" title="涂鸦记录">✏️</a>

</html>

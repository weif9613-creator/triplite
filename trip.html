<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TripLite">
  <meta name="format-detection" content="telephone=no,email=no,address=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>行程 · TripLite</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"></noscript>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-icon">✈️</span>
        <span class="brand-name">TripLite</span>
      </div>
      <div class="header-meta" id="headerDate"></div>
    </div>
  </header>

  <main class="app-main" id="appMain"></main>

  <nav class="bottom-nav">
    <a href="index.html"    class="nav-item"><i class="fas fa-home"></i><span>首页</span></a>
    <a href="trip.html"     class="nav-item active"><i class="fas fa-route"></i><span>行程</span></a>
    <a href="map.html"      class="nav-item"><i class="fas fa-map-marker-alt"></i><span>地图</span></a>
    <a href="checklist.html" class="nav-item"><i class="fas fa-check-square"></i><span>清单</span></a>
    <a href="weather.html"  class="nav-item"><i class="fas fa-cloud-sun"></i><span>天气</span></a>
    <a href="emergency.html" class="nav-item"><i class="fas fa-shield-alt"></i><span>应急</span></a>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 行程页逻辑

    // ── 单日天气速览小卡（使用WEATHER_DATA气候参考）──
    function renderDayWeatherBadge(dayIdx) {
      if (typeof WEATHER_DATA === 'undefined' || !WEATHER_DATA.days) return '';
      var w = WEATHER_DATA.days[dayIdx];
      if (!w) return '';
      var uvC = w.uvIndex >= 11 ? '#7c3aed' : w.uvIndex >= 8 ? '#ef4444' : w.uvIndex >= 6 ? '#f97316' : '#eab308';
      var riskBg = w.riskLevel === 'danger'
        ? 'background:#fee2e2;border-left:3px solid #ef4444;'
        : w.riskLevel === 'medium'
        ? 'background:#fef3c7;border-left:3px solid #f59e0b;'
        : 'background:#f0fdf4;border-left:3px solid #16a34a;';
      var mustDoTips = w.mustDo || '注意防晒补水';
      var weatherIcon = (w.weatherIcon || '🌡️');
      var weatherText = (w.weather || '');
      return '<div style="' + riskBg + 'border-radius:12px;padding:11px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;">'
        + '<div style="font-size:26px;flex-shrink:0;">' + weatherIcon + '</div>'
        + '<div style="flex:1;min-width:0;">'
        + '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;">'
        + '<span style="font-size:14px;font-weight:800;color:var(--text-primary);">' + w.tempHigh + '°/' + w.tempLow + '°</span>'
        + '<span style="font-size:12px;color:var(--text-secondary);">' + weatherText + '</span>'
        + '<span style="font-size:11px;padding:2px 7px;border-radius:20px;background:' + uvC + '22;color:' + uvC + ';font-weight:700;">UV ' + w.uvIndex + '</span>'
        + '<span style="font-size:11px;padding:2px 7px;border-radius:20px;background:#dbeafe;color:#1d4ed8;font-weight:600;">🌧️ ' + w.rainChance + '%</span>'
        + '</div>'
        + '<div style="font-size:11px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">⚡ ' + mustDoTips + '</div>'
        + '</div>'
        + '<a href="weather.html" style="font-size:11px;color:var(--primary-light);font-weight:700;flex-shrink:0;">详情→</a>'
        + '</div>';
    }

    // 兼容性写法：旧版本浏览器不支持URL构造器
    function getQueryParam(name) {
      try {
        var url = new URL(location.href);
        return url.searchParams.get(name);
      } catch(e) {
        // Fallback: 手动解析querystring
        var search = location.search.slice(1);
        var pairs = search.split('&');
        for (var i = 0; i < pairs.length; i++) {
          var pair = pairs[i].split('=');
          if (decodeURIComponent(pair[0]) === name) {
            return pair[1] ? decodeURIComponent(pair[1]) : '';
          }
        }
        return null;
      }
    }

    function renderTripOverview() {
      var main = document.getElementById('appMain');
      if (!main) return;
      var dayIdx = getCurrentDayIndex();
      
      var tlHtml = '';
      for (var ti = 0; ti < TRIP_DATA.days.length; ti++) {
        var d = TRIP_DATA.days[ti];
        var stateClass = ti < dayIdx ? 'done' : ti === dayIdx ? 'current' : 'future';
        var cardClass = ti === dayIdx ? 'current' : '';
        var todayLabel = ti === dayIdx ? '\u00b7 今天' : '';
        var summaryText = d.summary.length > 70 ? d.summary.substring(0, 70) + '…' : d.summary;
        var tagsHtml = '';
        for (var tgi = 0; tgi < d.tags.length; tgi++) {
          tagsHtml += '<span class="tag gray" style="font-size:10px;">' + d.tags[tgi] + '</span>';
        }
        tlHtml += '<div class="tl-item ' + stateClass + '" data-city="' + d.cityCode + '">'
          + '<div class="tl-card ' + cardClass + '" onclick="showDayDetail(' + d.id + ')">'
          + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">'
          + '<span style="font-size:22px;">' + d.emoji + '</span>'
          + '<div><div class="tl-date">' + d.shortDate + ' ' + todayLabel + '</div>'
          + '<div class="tl-title">' + d.title + '</div></div></div>'
          + '<div class="tl-subtitle" style="margin-bottom:6px;">' + summaryText + '</div>'
          + '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">'
          + '<span class="tl-badge ' + d.cityCode + '">' + d.city + '</span>' + tagsHtml
          + '</div>'
          + '<div style="text-align:right;font-size:12px;color:var(--primary-light);margin-top:8px;font-weight:600;">查看详情 →</div>'
          + '</div></div>';
      }

      main.innerHTML =
        '<div class="page-header">'
        + '<div class="page-header-title">📅 完整行程</div>'
        + '<div class="page-header-sub">澳门 → 芭提雅 → 曼谷 · 8天7晚</div>'
        + '</div>'
        + '<div class="city-tabs">'
        + '<button class="city-chip active" onclick="filterCity(\'all\', this)">🌏 全部</button>'
        + '<button class="city-chip" onclick="filterCity(\'macau\', this)">🎰 澳门</button>'
        + '<button class="city-chip" onclick="filterCity(\'pattaya\', this)">🏖️ 芭提雅</button>'
        + '<button class="city-chip" onclick="filterCity(\'bangkok\', this)">🏙️ 曼谷</button>'
        + '<button class="city-chip" onclick="filterCity(\'return\', this)">✈️ 返程</button>'
        + '</div>'
        + '<div class="timeline" id="tripTimeline">' + tlHtml + '</div>'
        + '<div class="safe-bottom"></div>';
    }
    
    function filterCity(city, btn) {
      document.querySelectorAll('.city-chip').forEach(function(c) { c.classList.remove('active'); });
      btn.classList.add('active');
      document.querySelectorAll('.tl-item').forEach(function(item) {
        item.style.display = (city === 'all' || item.dataset.city === city) ? '' : 'none';
      });
    }

    // 活动描述折叠：超过120字折叠，点击展开
    function renderActivityDesc(desc) {
      if (!desc) return '';
      var LIMIT = 120;
      if (desc.length <= LIMIT) {
        return '<div class="activity-desc" style="white-space:pre-line;">' + desc + '</div>';
      }
      var preview = desc.substring(0, LIMIT);
      var uid = 'adesc_' + Math.random().toString(36).substr(2, 6);
      return '<div class="activity-desc" style="white-space:pre-line;">'
        + '<span id="' + uid + '_pre">' + preview + '…</span>'
        + '<span id="' + uid + '_full" style="display:none;">' + desc + '</span>'
        + '<span id="' + uid + '_btn" onclick="event.stopPropagation();toggleActDesc(\'' + uid + '\')"'
        + ' style="color:var(--primary-light);font-size:11px;cursor:pointer;font-weight:600;user-select:none;"> 展开▾</span>'
        + '</div>';
    }

    function toggleActDesc(uid) {
      var pre = document.getElementById(uid + '_pre');
      var full = document.getElementById(uid + '_full');
      var btn = document.getElementById(uid + '_btn');
      if (!pre || !full || !btn) return;
      var isExpanded = full.style.display !== 'none';
      pre.style.display = isExpanded ? '' : 'none';
      full.style.display = isExpanded ? 'none' : '';
      btn.textContent = isExpanded ? ' 展开▾' : ' 收起▴';
    }

    // 警告文本中注入超链接
    function injectLinks(text) {
      return text
        .replace(/royalgrandpalace\.th/g, '<a href="http://www.royalgrandpalace.th" target="_blank" rel="noopener" style="color:var(--primary-light);font-weight:600;">royalgrandpalace.th ↗</a>')
        .replace(/tourismthailand\.org/g, '<a href="https://www.tourismthailand.org" target="_blank" rel="noopener" style="color:var(--primary-light);font-weight:600;">tourismthailand.org ↗</a>')
        .replace(/tdac\.immigration\.go\.th/g, '<a href="https://tdac.immigration.go.th" target="_blank" rel="noopener" style="color:var(--primary-light);font-weight:600;">tdac.immigration.go.th ↗</a>')
        .replace(/bts\.co\.th\/eng\/routemap/g, '<a href="https://www.bts.co.th/eng/routemap" target="_blank" rel="noopener" style="color:var(--primary-light);font-weight:600;">BTS路线图 ↗</a>');
    }

    function showDayDetail(dayId) {
      var day = null;
      for (var di = 0; di < TRIP_DATA.days.length; di++) {
        if (TRIP_DATA.days[di].id === dayId) { day = TRIP_DATA.days[di]; break; }
      }
      if (!day) return;
      var main = document.getElementById('appMain');
      if (!main) return;
      
      // 体力点
      var energyHtml = '';
      for (var ei = 1; ei <= 3; ei++) {
        energyHtml += '<div class="energy-dot ' + (ei <= day.energyLevel ? 'filled' : '') + '"></div>';
      }

      // 今日亮点
      var highlightHtml = '';
      if (day.highlights.length > 0) {
        var hlItems = '';
        for (var hi = 0; hi < day.highlights.length; hi++) {
          hlItems += '<span class="tag blue"><i class="fas fa-star" style="font-size:10px;"></i> ' + day.highlights[hi] + '</span>';
        }
        highlightHtml = '<div class="card"><div class="card-title" style="margin-bottom:10px;"><span class="icon">🎯</span>今日亮点</div><div style="display:flex;flex-wrap:wrap;gap:8px;">' + hlItems + '</div></div>';
      }

      // 时间块
      var timesHtml = '';
      for (var ti2 = 0; ti2 < day.times.length; ti2++) {
        var t = day.times[ti2];
        var actsHtml = '';
        for (var ai = 0; ai < t.activities.length; ai++) {
          var a = t.activities[ai];
          var typeTag = a.type === 'must' ? '<span class="tag red" style="font-size:10px;">必做</span>'
            : a.type === 'suggest' ? '<span class="tag amber" style="font-size:10px;">建议</span>'
            : a.type === 'optional' ? '<span class="tag gray" style="font-size:10px;">可选</span>' : '';
          var metaArr = a.meta || [];
          var metaHtml = '';
          for (var mi = 0; mi < metaArr.length; mi++) {
            metaHtml += '<span class="tag blue" style="font-size:10px;">📍 ' + metaArr[mi] + '</span>';
          }
          actsHtml += '<div class="activity-item"><div class="activity-dot ' + a.type + '"></div><div style="flex:1;"><div class="activity-name">' + a.name + '</div>' + renderActivityDesc(a.desc) + '<div class="activity-meta">' + typeTag + metaHtml + '</div></div></div>';
        }
        timesHtml += '<div class="time-block"><div class="time-block-header"><span class="time-label ' + t.period + '">' + t.label + '</span><span class="time-range">' + t.range + '</span></div>' + actsHtml + '</div>';
      }

      // 风险提醒
      var warningsHtml2 = '';
      if (day.warnings.length > 0) {
        warningsHtml2 = '<div class="card"><div class="card-title" style="margin-bottom:10px;"><span class="icon">⚠️</span>注意事项</div>';
        for (var wi = 0; wi < day.warnings.length; wi++) {
          var w = day.warnings[wi];
          var wIcon = w.type === 'danger' ? '🚨' : w.type === 'warning' ? '⚠️' : w.type === 'success' ? '✅' : 'ℹ️';
          warningsHtml2 += '<div class="alert-card ' + w.type + '" style="margin-bottom:8px;"><div class="alert-icon">' + wIcon + '</div><div class="alert-content"><div class="alert-title">' + w.title + '</div><div class="alert-text" style="white-space:pre-line;">' + injectLinks(w.text) + '</div></div></div>';
        }
        warningsHtml2 += '</div>';
      }

      // 备选方案
      var altHtml = '';
      if (day.alternatives.length > 0) {
        altHtml = '<div class="card"><div class="card-title" style="margin-bottom:10px;"><span class="icon">🔄</span>备选方案</div>';
        for (var alti = 0; alti < day.alternatives.length; alti++) {
          var alt = day.alternatives[alti];
          altHtml += '<div class="step-item"><div class="step-content"><div class="step-title">' + alt.name + '</div><div class="step-desc">' + alt.desc + '</div></div></div>';
        }
        altHtml += '</div>';
      }

      // 前后天导航
      var prevBtn = day.id > 1
        ? '<button onclick="showDayDetail(' + (day.id - 1) + ')" class="btn btn-secondary" style="flex:1;"><i class="fas fa-chevron-left"></i> 前一天</button>'
        : '<div style="flex:1;"></div>';
      var nextBtn = day.id < TRIP_DATA.days.length
        ? '<button onclick="showDayDetail(' + (day.id + 1) + ')" class="btn btn-primary" style="flex:1;">后一天 <i class="fas fa-chevron-right"></i></button>'
        : '<div style="flex:1;"></div>';

      main.innerHTML =
        '<div style="margin-bottom:12px;">'
        + '<button onclick="renderTripOverview()" style="display:inline-flex;align-items:center;gap:6px;color:var(--primary-light);font-weight:600;font-size:14px;background:none;border:none;cursor:pointer;padding:8px 0;">'
        + '<i class="fas fa-arrow-left"></i> 返回行程列表</button></div>'
        + '<div class="day-header">'
        + '<div class="day-date">' + day.shortDate + ' &middot; 第' + day.id + '天</div>'
        + '<div class="day-city">' + day.city + ' ' + day.emoji + '</div>'
        + '<div class="day-summary">' + day.summary + '</div>'
        + '<div class="day-energy"><span>体力消耗：</span><div class="energy-bar">' + energyHtml + '</div><span>' + getEnergyLabel(day.energyLevel) + '</span></div>'
        + '</div>'
        + renderDayWeatherBadge(day.id - 1)
        + highlightHtml
        + timesHtml
        + warningsHtml2
        + altHtml
        + '<div style="display:flex;gap:10px;margin-top:8px;">' + prevBtn + nextBtn + '</div>'
        + '<div class="safe-bottom"></div>';
      
      try { window.scrollTo(0, 0); } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', function() {
      var dayParam = getQueryParam('day');
      if (dayParam) {
        showDayDetail(parseInt(dayParam, 10));
      } else {
        renderTripOverview();
      }
      var now = new Date();
      var headerDate = document.getElementById('headerDate');
      if (headerDate) headerDate.textContent = (now.getMonth()+1) + '月' + now.getDate() + '日';
    });
  </script>

  <!-- 涂鸦悬浮按钮 -->
  <a href="note.html" class="note-fab" title="涂鸦记录">✏️</a>
</body>
</html>

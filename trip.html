<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a3a5c">
  <title>行程 · TripLite</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-icon">✈️</span>
        <span class="brand-name">TripLite</span>
      </div>
      <div class="header-meta" id="headerDate"></div>
    </div>
  </header>

  <main class="app-main" id="appMain"></main>

  <nav class="bottom-nav">
    <a href="index.html"    class="nav-item"><i class="fas fa-home"></i><span>首页</span></a>
    <a href="trip.html"     class="nav-item active"><i class="fas fa-route"></i><span>行程</span></a>
    <a href="map.html"      class="nav-item"><i class="fas fa-map-marker-alt"></i><span>地图</span></a>
    <a href="checklist.html" class="nav-item"><i class="fas fa-check-square"></i><span>清单</span></a>
    <a href="weather.html"  class="nav-item"><i class="fas fa-cloud-sun"></i><span>天气</span></a>
    <a href="emergency.html" class="nav-item"><i class="fas fa-shield-alt"></i><span>应急</span></a>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 行程页逻辑

    // ── 单日天气速览小卡（使用WEATHER_DATA气候参考）──
    function renderDayWeatherBadge(dayIdx) {
      if (typeof WEATHER_DATA === 'undefined' || !WEATHER_DATA.days) return '';
      const w = WEATHER_DATA.days[dayIdx];
      if (!w) return '';
      const uvC = w.uvIndex >= 11 ? '#7c3aed' : w.uvIndex >= 8 ? '#ef4444' : w.uvIndex >= 6 ? '#f97316' : '#eab308';
      const riskBg = w.riskLevel === 'danger'
        ? 'background:#fee2e2;border-left:3px solid #ef4444;'
        : w.riskLevel === 'medium'
        ? 'background:#fef3c7;border-left:3px solid #f59e0b;'
        : 'background:#f0fdf4;border-left:3px solid #16a34a;';
      const mustDoTips = w.mustDo || '注意防晒补水';
      return `
        <div style="${riskBg}border-radius:12px;padding:11px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;">
          <div style="font-size:26px;flex-shrink:0;">${w.weatherIcon || '🌡️'}</div>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
              <span style="font-size:14px;font-weight:800;color:var(--text-primary);">${w.tempHigh}°/${w.tempLow}°</span>
              <span style="font-size:12px;color:var(--text-secondary);">${w.weather || ''}</span>
              <span style="font-size:11px;padding:2px 7px;border-radius:20px;background:${uvC}22;color:${uvC};font-weight:700;">UV ${w.uvIndex}</span>
              <span style="font-size:11px;padding:2px 7px;border-radius:20px;background:#dbeafe;color:#1d4ed8;font-weight:600;">🌧️ ${w.rainChance}%</span>
            </div>
            <div style="font-size:11px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">⚡ ${mustDoTips}</div>
          </div>
          <a href="weather.html" style="font-size:11px;color:var(--primary-light);font-weight:700;flex-shrink:0;">详情→</a>
        </div>`;
    }

    function getQueryParam(name) {
      const url = new URL(location.href);
      return url.searchParams.get(name);
    }

    function renderTripOverview() {
      const main = document.getElementById('appMain');
      const dayIdx = getCurrentDayIndex();
      
      main.innerHTML = `
        <div class="page-header">
          <div class="page-header-title">📅 完整行程</div>
          <div class="page-header-sub">澳门 → 芭提雅 → 曼谷 · 8天7晚</div>
        </div>
        
        <!-- 城市筛选 -->
        <div class="city-tabs">
          <button class="city-chip active" onclick="filterCity('all', this)">🌏 全部</button>
          <button class="city-chip" onclick="filterCity('macau', this)">🎰 澳门</button>
          <button class="city-chip" onclick="filterCity('pattaya', this)">🏖️ 芭提雅</button>
          <button class="city-chip" onclick="filterCity('bangkok', this)">🏙️ 曼谷</button>
          <button class="city-chip" onclick="filterCity('return', this)">✈️ 返程</button>
        </div>
        
        <!-- 行程时间轴 -->
        <div class="timeline" id="tripTimeline">
          ${TRIP_DATA.days.map((d, i) => `
            <div class="tl-item ${i < dayIdx ? 'done' : i === dayIdx ? 'current' : 'future'}" data-city="${d.cityCode}">
              <div class="tl-card ${i === dayIdx ? 'current' : ''}" onclick="showDayDetail(${d.id})">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                  <span style="font-size:22px;">${d.emoji}</span>
                  <div>
                    <div class="tl-date">${d.shortDate} ${i === dayIdx ? '· 今天' : ''}</div>
                    <div class="tl-title">${d.title}</div>
                  </div>
                </div>
                <div class="tl-subtitle" style="margin-bottom:6px;">${d.summary.length > 70 ? d.summary.substring(0, 70) + '…' : d.summary}</div>
                <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
                  <span class="tl-badge ${d.cityCode}">${d.city}</span>
                  ${d.tags.map(t => `<span class="tag gray" style="font-size:10px;">${t}</span>`).join('')}
                </div>
                <div style="text-align:right;font-size:12px;color:var(--primary-light);margin-top:8px;font-weight:600;">
                  查看详情 →
                </div>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="safe-bottom"></div>
      `;
    }
    
    function filterCity(city, btn) {
      document.querySelectorAll('.city-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      
      document.querySelectorAll('.tl-item').forEach(item => {
        if (city === 'all' || item.dataset.city === city) {
          item.style.display = '';
        } else {
          item.style.display = 'none';
        }
      });
    }

    // 活动描述折叠：超过120字折叠，点击展开
    function renderActivityDesc(desc) {
      if (!desc) return '';
      const LIMIT = 120;
      if (desc.length <= LIMIT) {
        return `<div class="activity-desc" style="white-space:pre-line;">${desc}</div>`;
      }
      const preview = desc.substring(0, LIMIT);
      const uid = 'adesc_' + Math.random().toString(36).substr(2, 6);
      return `
        <div class="activity-desc" style="white-space:pre-line;">
          <span id="${uid}_pre">${preview}…</span>
          <span id="${uid}_full" style="display:none;">${desc}</span>
          <span id="${uid}_btn" onclick="event.stopPropagation();toggleActDesc('${uid}')"
            style="color:var(--primary-light);font-size:11px;cursor:pointer;font-weight:600;user-select:none;"> 展开▾</span>
        </div>`;
    }

    function toggleActDesc(uid) {
      const pre = document.getElementById(uid + '_pre');
      const full = document.getElementById(uid + '_full');
      const btn = document.getElementById(uid + '_btn');
      if (!pre || !full || !btn) return;
      const isExpanded = full.style.display !== 'none';
      pre.style.display = isExpanded ? '' : 'none';
      full.style.display = isExpanded ? 'none' : '';
      btn.textContent = isExpanded ? ' 展开▾' : ' 收起▴';
    }

    // 警告文本中注入超链接
    function injectLinks(text) {
      return text
        .replace(/royalgrandpalace\.th/g, '<a href="http://www.royalgrandpalace.th" target="_blank" rel="noopener" style="color:var(--primary-light);font-weight:600;">royalgrandpalace.th ↗</a>')
        .replace(/tourismthailand\.org/g, '<a href="https://www.tourismthailand.org" target="_blank" rel="noopener" style="color:var(--primary-light);font-weight:600;">tourismthailand.org ↗</a>')
        .replace(/tdac\.immigration\.go\.th/g, '<a href="https://tdac.immigration.go.th" target="_blank" rel="noopener" style="color:var(--primary-light);font-weight:600;">tdac.immigration.go.th ↗</a>')
        .replace(/bts\.co\.th\/eng\/routemap/g, '<a href="https://www.bts.co.th/eng/routemap" target="_blank" rel="noopener" style="color:var(--primary-light);font-weight:600;">BTS路线图 ↗</a>');
    }

    function showDayDetail(dayId) {
      const day = TRIP_DATA.days.find(d => d.id === dayId);
      if (!day) return;
      
      const main = document.getElementById('appMain');
      
      main.innerHTML = `
        <!-- 返回按钮 -->
        <div style="margin-bottom:12px;">
          <button onclick="renderTripOverview()" style="display:inline-flex;align-items:center;gap:6px;color:var(--primary-light);font-weight:600;font-size:14px;background:none;border:none;cursor:pointer;padding:8px 0;">
            <i class="fas fa-arrow-left"></i> 返回行程列表
          </button>
        </div>
        
        <!-- 单日头部 -->
        <div class="day-header">
          <div class="day-date">${day.shortDate} · 第${day.id}天</div>
          <div class="day-city">${day.city} ${day.emoji}</div>
          <div class="day-summary">${day.summary}</div>
          <div class="day-energy">
            <span>体力消耗：</span>
            <div class="energy-bar">
              ${[1,2,3].map(i => `<div class="energy-dot ${i <= day.energyLevel ? 'filled' : ''}"></div>`).join('')}
            </div>
            <span>${getEnergyLabel(day.energyLevel)}</span>
          </div>
        </div>
        
        <!-- 当日天气速览 -->
        ${renderDayWeatherBadge(day.id - 1)}
        
        <!-- 今日亮点 -->
        ${day.highlights.length > 0 ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:10px;"><span class="icon">🎯</span>今日亮点</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;">
            ${day.highlights.map(h => `<span class="tag blue"><i class="fas fa-star" style="font-size:10px;"></i> ${h}</span>`).join('')}
          </div>
        </div>
        ` : ''}
        
        <!-- 时间块 -->
        ${day.times.map(t => `
          <div class="time-block">
            <div class="time-block-header">
              <span class="time-label ${t.period}">${t.label}</span>
              <span class="time-range">${t.range}</span>
            </div>
            ${t.activities.map(a => `
              <div class="activity-item">
                <div class="activity-dot ${a.type}"></div>
                <div style="flex:1;">
                  <div class="activity-name">${a.name}</div>
                  ${renderActivityDesc(a.desc)}
                  <div class="activity-meta">
                    ${a.type === 'must' ? '<span class="tag red" style="font-size:10px;">必做</span>' : ''}
                    ${a.type === 'suggest' ? '<span class="tag amber" style="font-size:10px;">建议</span>' : ''}
                    ${a.type === 'optional' ? '<span class="tag gray" style="font-size:10px;">可选</span>' : ''}
                    ${(a.meta || []).map(m => `<span class="tag blue" style="font-size:10px;">📍 ${m}</span>`).join('')}
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `).join('')}
        
        <!-- 风险提醒 -->
        ${day.warnings.length > 0 ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:10px;"><span class="icon">⚠️</span>注意事项</div>
          ${day.warnings.map(w => `
            <div class="alert-card ${w.type}" style="margin-bottom:8px;">
              <div class="alert-icon">${w.type === 'danger' ? '🚨' : w.type === 'warning' ? '⚠️' : w.type === 'success' ? '✅' : 'ℹ️'}</div>
              <div class="alert-content">
                <div class="alert-title">${w.title}</div>
                <div class="alert-text" style="white-space:pre-line;">${injectLinks(w.text)}</div>
              </div>
            </div>
          `).join('')}
        </div>
        ` : ''}
        
        <!-- 备选方案 -->
        ${day.alternatives.length > 0 ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:10px;"><span class="icon">🔄</span>备选方案</div>
          ${day.alternatives.map(a => `
            <div class="step-item">
              <div class="step-content">
                <div class="step-title">${a.name}</div>
                <div class="step-desc">${a.desc}</div>
              </div>
            </div>
          `).join('')}
        </div>
        ` : ''}
        
        <!-- 前后天导航 -->
        <div style="display:flex;gap:10px;margin-top:8px;">
          ${day.id > 1 ? `
          <button onclick="showDayDetail(${day.id - 1})" class="btn btn-secondary" style="flex:1;">
            <i class="fas fa-chevron-left"></i> 前一天
          </button>
          ` : '<div style="flex:1;"></div>'}
          ${day.id < TRIP_DATA.days.length ? `
          <button onclick="showDayDetail(${day.id + 1})" class="btn btn-primary" style="flex:1;">
            后一天 <i class="fas fa-chevron-right"></i>
          </button>
          ` : '<div style="flex:1;"></div>'}
        </div>
        
        <div class="safe-bottom"></div>
      `;
      
      window.scrollTo(0, 0);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const dayParam = getQueryParam('day');
      if (dayParam) {
        showDayDetail(parseInt(dayParam));
      } else {
        renderTripOverview();
      }
      
      const now = new Date();
      const headerDate = document.getElementById('headerDate');
      if (headerDate) headerDate.textContent = `${now.getMonth()+1}月${now.getDate()}日`;
    });
  </script>

  <!-- 涂鸦悬浮按钮 -->
  <a href="note.html" class="note-fab" title="涂鸦记录"><i class="fas fa-pen-nib"></i></a>
</body>
</html>

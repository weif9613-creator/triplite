<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#1a3a5c">
  <!-- iOS PWA 全屏支持 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TripLite">
  <meta name="format-detection" content="telephone=no,email=no,address=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>涂鸦记录 · TripLite</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"></noscript>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    :root {
      --primary: #1a3a5c;
      --primary-light: #3b82f6;
      --bg-page: #f0f4f8;
      --bg-card: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --radius: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow: hidden; /* 防止页面滚动干扰画布 */
      background: #1a3a5c;
      font-family: 'Inter', -apple-system, sans-serif;
      touch-action: none; /* 全局禁用浏览器默认触摸行为 */
    }

    /* ── 顶部工具栏 ── */
    #toolbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(26,58,92,0.97);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      padding: 10px 12px;
      padding-top: calc(10px + env(safe-area-inset-top, 0px));
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    #toolbar::-webkit-scrollbar { display: none; }

    .tb-section {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .tb-divider {
      width: 1px;
      height: 28px;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
    .tb-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 2px solid transparent;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .tb-btn:active { transform: scale(0.88); }
    .tb-btn.active {
      background: rgba(59,130,246,0.8);
      border-color: #3b82f6;
    }
    .tb-btn.danger:active { background: rgba(239,68,68,0.8); }

    /* 颜色点 */
    .color-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-dot.active {
      border-color: white;
      transform: scale(1.15);
    }
    .color-dot:active { transform: scale(0.9); }

    /* 笔刷大小滑块 */
    #sizeSlider {
      width: 70px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    #sizeSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
    }

    /* ── 画布区域 ── */
    #canvas-wrap {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      background: #fff;
      touch-action: none;
    }

    #drawCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
      touch-action: none;
    }

    /* 文字输入模式时显示的蒙层提示 */
    #text-hint {
      position: fixed;
      bottom: calc(80px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
      display: none;
      z-index: 200;
      white-space: nowrap;
    }

    /* ── 可拖动文字层 ── */
    #text-layer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; /* 默认不拦截画布事件 */
      z-index: 10;
    }
    /* 文字节点 */
    .text-node {
      position: absolute;
      cursor: move;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: all;
      padding: 4px 6px;
      border-radius: 4px;
      border: 1.5px dashed transparent;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-all;
      max-width: 80vw;
      touch-action: none;
    }
    .text-node.selected {
      border-color: #3b82f6;
      background: rgba(59,130,246,0.07);
    }
    /* 文字节点删除按钮 */
    .text-node-del {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ef4444;
      color: white;
      font-size: 13px;
      line-height: 20px;
      text-align: center;
      cursor: pointer;
      display: none;
      z-index: 20;
      font-style: normal;
    }
    .text-node.selected .text-node-del { display: block; }

    /* ── 浮动文字输入框 ── */
    #textInputBox {
      position: fixed;
      z-index: 300;
      background: white;
      border: 2px solid var(--primary-light);
      border-radius: 12px;
      padding: 8px 10px;
      min-width: 140px;
      max-width: calc(100vw - 40px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      display: none;
    }
    #textInput {
      width: 100%;
      border: none;
      outline: none;
      font-size: 16px; /* 防止iOS自动缩放 */
      font-family: 'Inter', sans-serif;
      color: #1e293b;
      background: transparent;
      resize: none;
      min-height: 32px;
      max-height: 120px;
      overflow-y: auto;
    }
    .text-input-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      align-items: center;
    }
    .text-input-actions button {
      flex: 1;
      padding: 6px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .ti-confirm { background: #3b82f6; color: white; }
    .ti-cancel  { background: #f1f5f9; color: #64748b; }
    .text-size-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .ts-chip {
      flex: 1;
      text-align: center;
      padding: 4px;
      border-radius: 6px;
      border: 1.5px solid #e2e8f0;
      font-weight: 700;
      cursor: pointer;
      background: #f8fafc;
      color: #475569;
    }
    .ts-chip.active { border-color: #3b82f6; background: #eff6ff; color: #2563eb; }

    /* ── 底部工具栏 ── */
    #bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(26,58,92,0.97);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      padding: 10px 16px;
      padding-bottom: calc(10px + var(--safe-bottom));
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bb-btn {
      flex: 1;
      padding: 10px 6px;
      border: none;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: transform 0.15s;
      color: white;
    }
    .bb-btn:active { transform: scale(0.92); }
    .bb-btn i { font-size: 18px; }
    .bb-btn.blue   { background: #2563eb; }
    .bb-btn.green  { background: #059669; }
    .bb-btn.amber  { background: #d97706; }
    .bb-btn.gray   { background: rgba(255,255,255,0.15); }
    .bb-btn.red    { background: #dc2626; }

    /* ── 画布切换页码 ── */
    #page-indicator {
      position: fixed;
      top: calc(64px + env(safe-area-inset-top, 0px));
      right: 12px;
      z-index: 99;
      background: rgba(26,58,92,0.85);
      color: white;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      pointer-events: none;
    }

    /* ── 保存提示 ── */
    #save-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: rgba(5,150,105,0.95);
      color: white;
      padding: 16px 28px;
      border-radius: 18px;
      font-size: 15px;
      font-weight: 800;
      z-index: 500;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
    }
    #save-toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* ── 背景选择面板 ── */
    #bg-panel {
      position: fixed;
      bottom: calc(70px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      background: white;
      border-radius: 16px;
      padding: 12px 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      display: none;
      width: calc(100vw - 32px);
      max-width: 380px;
    }
    #bg-panel h4 {
      font-size: 13px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 10px;
    }
    .bg-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .bg-item {
      aspect-ratio: 1;
      /* aspect-ratio fallback for older browsers */
      min-height: 60px;
      border-radius: 10px;
      border: 2.5px solid transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #475569;
      overflow: hidden;
    }
    .bg-item.active { border-color: #3b82f6; }
    .bg-item:active { opacity: 0.7; }

    /* ── 多页管理面板 ── */
    #pages-panel {
      position: fixed;
      bottom: calc(70px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      background: white;
      border-radius: 16px;
      padding: 12px 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      display: none;
      width: calc(100vw - 32px);
      max-width: 380px;
      max-height: 60vh;
      overflow-y: auto;
    }
    #pages-panel h4 {
      font-size: 13px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .page-thumb-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .page-thumb {
      aspect-ratio: 0.7;
      /* aspect-ratio fallback */
      min-height: 80px;
      border-radius: 8px;
      border: 2px solid #e2e8f0;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: #f8fafc;
    }
    .page-thumb.active { border-color: #3b82f6; }
    .page-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .page-thumb-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.5);
      color: white;
      text-align: center;
      font-size: 10px;
      padding: 3px;
    }
    .page-thumb-del {
      position: absolute;
      top: 3px; right: 3px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: rgba(220,38,38,0.85);
      color: white;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .add-page-btn {
      aspect-ratio: 0.7;
      min-height: 80px;
      border-radius: 8px;
      border: 2px dashed #cbd5e1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: #f8fafc;
      color: #94a3b8;
      gap: 4px;
      font-size: 11px;
    }
    .add-page-btn i { font-size: 20px; }

    /* ── 蒙层（关闭面板用）── */
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 150;
      background: rgba(0,0,0,0.3);
      display: none;
    }

    /* 画布内容区域适配工具栏高度 */
    #canvas-wrap {
      top: calc(56px + env(safe-area-inset-top, 0px));
      bottom: calc(64px + var(--safe-bottom));
    }
  </style>
</head>
<body>

<!-- ── 顶部工具栏 ── -->
<div id="toolbar">
  <!-- 工具选择 -->
  <div class="tb-section">
    <div class="tb-btn active" id="btn-pen" onclick="setTool('pen')" title="画笔">
      <i class="fas fa-pen"></i>
    </div>
    <div class="tb-btn" id="btn-marker" onclick="setTool('marker')" title="马克笔">
      <i class="fas fa-highlighter"></i>
    </div>
    <div class="tb-btn" id="btn-eraser" onclick="setTool('eraser')" title="橡皮">
      <i class="fas fa-eraser"></i>
    </div>
    <div class="tb-btn" id="btn-text" onclick="setTool('text')" title="文字">
      <i class="fas fa-font"></i>
    </div>
  </div>

  <div class="tb-divider"></div>

  <!-- 颜色 -->
  <div class="tb-section" id="colorSection">
    <div class="color-dot active" style="background:#1e293b" data-color="#1e293b" onclick="setColor(this)"></div>
    <div class="color-dot" style="background:#ef4444" data-color="#ef4444" onclick="setColor(this)"></div>
    <div class="color-dot" style="background:#f97316" data-color="#f97316" onclick="setColor(this)"></div>
    <div class="color-dot" style="background:#eab308" data-color="#eab308" onclick="setColor(this)"></div>
    <div class="color-dot" style="background:#22c55e" data-color="#22c55e" onclick="setColor(this)"></div>
    <div class="color-dot" style="background:#3b82f6" data-color="#3b82f6" onclick="setColor(this)"></div>
    <div class="color-dot" style="background:#a855f7" data-color="#a855f7" onclick="setColor(this)"></div>
    <div class="color-dot" style="background:#ffffff;border:2px solid rgba(255,255,255,0.5);" data-color="#ffffff" onclick="setColor(this)"></div>
  </div>

  <div class="tb-divider"></div>

  <!-- 笔刷大小 -->
  <div class="tb-section">
    <span style="font-size:10px;color:rgba(255,255,255,0.7);">粗细</span>
    <input type="range" id="sizeSlider" min="2" max="30" value="4" oninput="setBrushSize(this.value)">
    <div id="sizePreview" style="width:14px;height:14px;border-radius:50%;background:white;flex-shrink:0;transition:all 0.2s;"></div>
  </div>

  <div class="tb-divider"></div>

  <!-- 撤销/清除 -->
  <div class="tb-section">
    <div class="tb-btn" onclick="undo()" title="撤销">
      <i class="fas fa-undo"></i>
    </div>
    <div class="tb-btn danger" onclick="clearCanvas()" title="清空">
      <i class="fas fa-trash-alt"></i>
    </div>
  </div>
</div>

<!-- 页码指示器 -->
<div id="page-indicator">第 1 / 1 页</div>

<!-- 文字输入模式提示 -->
<div id="text-hint">✏️ 点击画面任意位置输入文字</div>

<!-- ── 画布 ── -->
<div id="canvas-wrap">
  <canvas id="drawCanvas"></canvas>
  <!-- 可拖动文字层 -->
  <div id="text-layer"></div>
</div>

<!-- ── 浮动文字输入框 ── -->
<div id="textInputBox">
  <div class="text-size-row">
    <div class="ts-chip active" data-size="16" onclick="setTextSize(this)">小</div>
    <div class="ts-chip" data-size="22" onclick="setTextSize(this)">中</div>
    <div class="ts-chip" data-size="30" onclick="setTextSize(this)">大</div>
    <div class="ts-chip" data-size="42" onclick="setTextSize(this)">特大</div>
  </div>
  <textarea id="textInput" placeholder="输入文字…" rows="2"></textarea>
  <div class="text-input-actions">
    <button class="ti-confirm" onclick="confirmText()">✅ 放置</button>
    <button class="ti-cancel"  onclick="cancelText()">取消</button>
  </div>
</div>

<!-- ── 底部工具栏 ── -->
<div id="bottom-bar">
  <button class="bb-btn gray" onclick="togglePagesPanel()">
    <i class="fas fa-layer-group"></i>
    <span>多页</span>
  </button>
  <button class="bb-btn gray" onclick="toggleBgPanel()">
    <i class="fas fa-image"></i>
    <span>背景</span>
  </button>
  <button class="bb-btn green" onclick="saveImage()">
    <i class="fas fa-download"></i>
    <span>保存图片</span>
  </button>
  <button class="bb-btn blue" onclick="shareImage()">
    <i class="fas fa-share-alt"></i>
    <span>分享</span>
  </button>
  <a href="index.html" class="bb-btn gray" style="text-decoration:none;">
    <i class="fas fa-home"></i>
    <span>首页</span>
  </a>
</div>

<!-- ── 背景选择面板 ── -->
<div id="bg-panel">
  <h4>🎨 选择背景</h4>
  <div class="bg-grid" id="bgGrid">
    <!-- 由 JS 生成 -->
  </div>
</div>

<!-- ── 多页管理面板 ── -->
<div id="pages-panel">
  <h4>
    <span>📄 画布页面</span>
    <span style="font-size:11px;color:#64748b;font-weight:500;">点击切换·长按删除</span>
  </h4>
  <div class="page-thumb-grid" id="pageThumbGrid">
    <!-- 由 JS 生成 -->
  </div>
</div>

<!-- 蒙层 -->
<div id="overlay" onclick="closeAllPanels()"></div>

<!-- 保存提示 -->
<div id="save-toast">✅ 图片已保存<br><span style="font-size:12px;font-weight:500;">长按图片可发送到相册</span></div>

<script>
// ====================================================
// TripLite 涂鸦记录模块
// ====================================================

// ── 状态 ──
var state = {
  tool: 'pen',        // pen | marker | eraser | text
  color: '#1e293b',
  brushSize: 4,
  textSize: 16,
  textColor: '#1e293b',
  isDrawing: false,
  lastX: 0,
  lastY: 0,
  textPos: { x: 0, y: 0 },
  bgStyle: 'white'    // white | grid | lines | dot | dark | ...
};

// ── 多页管理 ──
var pages = [];       // 每页存储 dataURL
var currentPage = 0;
var MAX_PAGES = 10;

// ── 撤销栈 ──
var undoStack = [];
var MAX_UNDO = 20;

// ── DOM ──
var canvas  = document.getElementById('drawCanvas');
var ctx     = canvas.getContext('2d');
var wrap    = document.getElementById('canvas-wrap');
var textBox = document.getElementById('textInputBox');
var textIn  = document.getElementById('textInput');

// ── 初始化 ──
function init() {
  resizeCanvas();
  initPage();
  window.addEventListener('resize', debounce(resizeCanvas, 200));
  window.addEventListener('orientationchange', function() { setTimeout(resizeCanvas, 300); });

  // 绑定画布事件
  canvas.addEventListener('mousedown',  onStart);
  canvas.addEventListener('mousemove',  onMove);
  canvas.addEventListener('mouseup',    onEnd);
  canvas.addEventListener('mouseleave', onEnd);

  canvas.addEventListener('touchstart',  onStart, { passive: false });
  canvas.addEventListener('touchmove',   onMove,  { passive: false });
  canvas.addEventListener('touchend',    onEnd,   { passive: false });
  canvas.addEventListener('touchcancel', onEnd,   { passive: false });

  // 初始化背景面板
  buildBgPanel();

  // 更新笔刷预览
  updateBrushPreview();
}

function debounce(fn, ms) {
  var t;
  return function() {
    var args = arguments;
    clearTimeout(t);
    t = setTimeout(function() { fn.apply(null, args); }, ms);
  };
}

// ── 画布尺寸适配 ──
function resizeCanvas() {
  var w = wrap.clientWidth;
  var h = wrap.clientHeight;
  var snap = pages[currentPage] || null;
  canvas.width  = w * window.devicePixelRatio;
  canvas.height = h * window.devicePixelRatio;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  drawBackground(state.bgStyle);
  if (snap) {
    var rsImg = new Image();
    rsImg.onload = function() { ctx.drawImage(rsImg, 0, 0, w, h); };
    rsImg.src = snap;
  }
}

// ── 页面初始化 ──
function initPage() {
  if (pages.length === 0) {
    pages.push(null);
    currentPage = 0;
  }
  undoStack = [];
  drawBackground(state.bgStyle);
  updatePageIndicator();
}

function loadPage(idx) {
  saveCurrent();
  currentPage = idx;
  undoStack = [];
  var snap = pages[idx];
  var w = wrap.clientWidth;
  var h = wrap.clientHeight;
  drawBackground(state.bgStyle);
  if (textLayer) { textLayer.innerHTML = ''; selectedTextNode = null; }
  if (snap) {
    var lpImg = new Image();
    lpImg.onload = function() { ctx.drawImage(lpImg, 0, 0, w, h); };
    lpImg.src = snap;
  }
  updatePageIndicator();
}

function saveCurrent() {
  pages[currentPage] = canvas.toDataURL('image/png');
}

function updatePageIndicator() {
  document.getElementById('page-indicator').textContent = '第 ' + (currentPage+1) + ' / ' + pages.length + ' 页';
}

// ── 背景绘制 ──
var BG_STYLES = [
  { id: 'white',   label: '白纸',   draw: function(c2, w, h) { c2.fillStyle='#fff'; c2.fillRect(0,0,w,h); } },
  { id: 'cream',   label: '米色',   draw: function(c2, w, h) { c2.fillStyle='#fffbeb'; c2.fillRect(0,0,w,h); } },
  { id: 'dark',    label: '深色',   draw: function(c2, w, h) { c2.fillStyle='#1e293b'; c2.fillRect(0,0,w,h); } },
  { id: 'blue',    label: '蓝色',   draw: function(c2, w, h) { c2.fillStyle='#eff6ff'; c2.fillRect(0,0,w,h); } },
  { id: 'grid',    label: '方格纸', draw: function(c2, w, h) {
    c2.fillStyle='#fff'; c2.fillRect(0,0,w,h);
    c2.strokeStyle='#dbeafe'; c2.lineWidth=0.8;
    var g=24,x,y;
    for(x=0;x<w;x+=g){ c2.beginPath();c2.moveTo(x,0);c2.lineTo(x,h);c2.stroke(); }
    for(y=0;y<h;y+=g){ c2.beginPath();c2.moveTo(0,y);c2.lineTo(w,y);c2.stroke(); }
  }},
  { id: 'lines',   label: '横线纸', draw: function(c2, w, h) {
    c2.fillStyle='#fff'; c2.fillRect(0,0,w,h);
    c2.strokeStyle='#bfdbfe'; c2.lineWidth=0.8;
    var g=32,y;
    for(y=g;y<h;y+=g){ c2.beginPath();c2.moveTo(0,y);c2.lineTo(w,y);c2.stroke(); }
    c2.strokeStyle='#ef4444'; c2.lineWidth=1;
    c2.beginPath();c2.moveTo(50,0);c2.lineTo(50,h);c2.stroke();
  }},
  { id: 'dot',     label: '点阵纸', draw: function(c2, w, h) {
    c2.fillStyle='#fff'; c2.fillRect(0,0,w,h);
    c2.fillStyle='#93c5fd';
    var g=20,x,y;
    for(x=g;x<w;x+=g) for(y=g;y<h;y+=g){ c2.beginPath();c2.arc(x,y,1.2,0,Math.PI*2);c2.fill(); }
  }},
  { id: 'map',     label: '地图格', draw: function(c2, w, h) {
    c2.fillStyle='#f0fdf4'; c2.fillRect(0,0,w,h);
    c2.strokeStyle='#86efac'; c2.lineWidth=1;
    var g=30,x,y;
    for(x=0;x<w;x+=g){ c2.beginPath();c2.moveTo(x,0);c2.lineTo(x,h);c2.stroke(); }
    for(y=0;y<h;y+=g){ c2.beginPath();c2.moveTo(0,y);c2.lineTo(w,y);c2.stroke(); }
    c2.strokeStyle='#16a34a'; c2.lineWidth=1.5;
    for(x=0;x<w;x+=g*5){ c2.beginPath();c2.moveTo(x,0);c2.lineTo(x,h);c2.stroke(); }
    for(y=0;y<h;y+=g*5){ c2.beginPath();c2.moveTo(0,y);c2.lineTo(w,y);c2.stroke(); }
  }}
];

function drawBackground(styleId) {
  var w = wrap.clientWidth;
  var h = wrap.clientHeight;
  var bg = BG_STYLES[0];
  for (var bgi = 0; bgi < BG_STYLES.length; bgi++) { if (BG_STYLES[bgi].id === styleId) { bg = BG_STYLES[bgi]; break; } }
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0); // 重置DPR变换
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.clearRect(0, 0, w, h);
  bg.draw(ctx, w, h);
  ctx.restore();
}

function buildBgPanel() {
  var grid = document.getElementById('bgGrid');
  grid.innerHTML = '';
  for (var bpi = 0; bpi < BG_STYLES.length; bpi++) {
    (function(bg) {
      var d = document.createElement('div');
      d.className = 'bg-item' + (bg.id === state.bgStyle ? ' active' : '');
      d.dataset.bg = bg.id;
      var c = document.createElement('canvas');
      c.width = 60; c.height = 80;
      bg.draw(c.getContext('2d'), 60, 80);
      d.appendChild(c);
      var lbl = document.createElement('div');
      lbl.style.cssText = 'position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:9px;font-weight:700;padding:2px;background:rgba(255,255,255,0.8);color:#475569;';
      lbl.textContent = bg.label;
      d.style.position = 'relative';
      d.appendChild(lbl);
      d.onclick = function() { selectBg(bg.id, d); };
      grid.appendChild(d);
    })(BG_STYLES[bpi]);
  }
}

function selectBg(id, el) {
  state.bgStyle = id;
  var bgItems = document.querySelectorAll('.bg-item');
  for (var bi = 0; bi < bgItems.length; bi++) bgItems[bi].classList.remove('active');
  el.classList.add('active');
  var snap = canvas.toDataURL();
  var w = wrap.clientWidth;
  var h = wrap.clientHeight;
  drawBackground(id);
  var sbImg = new Image();
  sbImg.onload = function() { ctx.drawImage(sbImg, 0, 0, w, h); };
  sbImg.src = snap;
  saveCurrent();
  closeAllPanels();
}

// ── 工具切换 ──
function setTool(tool) {
  state.tool = tool;
  var tools = ['pen','marker','eraser','text'];
  for (var ti = 0; ti < tools.length; ti++) {
    var tbtn = document.getElementById('btn-'+tools[ti]);
    if (tbtn) tbtn.classList.toggle('active', tools[ti] === tool);
  }
  var hint = document.getElementById('text-hint');
  hint.style.display = tool === 'text' ? 'block' : 'none';
  canvas.style.cursor = tool === 'eraser' ? 'cell' : 'crosshair';
}

// ── 颜色 ──
function setColor(el) {
  state.color = el.dataset.color;
  state.textColor = el.dataset.color;
  var dots = document.querySelectorAll('.color-dot');
  for (var di = 0; di < dots.length; di++) dots[di].classList.remove('active');
  el.classList.add('active');
  if (state.tool === 'eraser') setTool('pen');
}

// ── 笔刷大小 ──
function setBrushSize(v) {
  state.brushSize = parseInt(v);
  updateBrushPreview();
}
function updateBrushPreview() {
  var p = document.getElementById('sizePreview');
  var s = Math.max(6, Math.min(state.brushSize * 2, 26));
  p.style.width = s + 'px';
  p.style.height = s + 'px';
}

// ── 坐标提取（兼容鼠标和触摸）──
function getPos(e) {
  var rect = canvas.getBoundingClientRect();
  var x, y;
  if (e.touches && e.touches.length > 0) {
    x = e.touches[0].clientX - rect.left;
    y = e.touches[0].clientY - rect.top;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    x = e.changedTouches[0].clientX - rect.left;
    y = e.changedTouches[0].clientY - rect.top;
  } else {
    x = e.clientX - rect.left;
    y = e.clientY - rect.top;
  }
  return { x: x, y: y };
}

// ── 绘图事件 ──
function onStart(e) {
  e.preventDefault();
  var pos = getPos(e);

  if (state.tool === 'text') {
    state.textPos = pos;
    openTextBox(pos);
    return;
  }

  // 保存撤销快照
  pushUndo();

  state.isDrawing = true;
  state.lastX = pos.x;
  state.lastY = pos.y;

  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);

  if (state.tool === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth = state.brushSize * 3;
  } else if (state.tool === 'marker') {
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 0.35;
    ctx.lineWidth = state.brushSize * 3;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    ctx.lineWidth = state.brushSize;
  }

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = state.tool === 'eraser' ? 'rgba(0,0,0,1)' : state.color;

  // 点点效果
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, (ctx.lineWidth / 2), 0, Math.PI * 2);
  ctx.fillStyle = state.tool === 'eraser' ? 'rgba(0,0,0,1)' : state.color;
  ctx.fill();
}

function onMove(e) {
  e.preventDefault();
  if (!state.isDrawing) return;
  var pos = getPos(e);

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (state.tool === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth = state.brushSize * 3;
    ctx.strokeStyle = 'rgba(0,0,0,1)';
  } else if (state.tool === 'marker') {
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 0.35;
    ctx.lineWidth = state.brushSize * 3;
    ctx.strokeStyle = state.color;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    ctx.lineWidth = state.brushSize;
    ctx.strokeStyle = state.color;
  }

  ctx.beginPath();
  ctx.moveTo(state.lastX, state.lastY);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();

  state.lastX = pos.x;
  state.lastY = pos.y;
}

function onEnd(e) {
  e.preventDefault();
  if (!state.isDrawing) return;
  state.isDrawing = false;
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

// ── 文字输入 ──
var textFontSize = 16;
var textLayer = document.getElementById('text-layer');
var selectedTextNode = null;

function setTextSize(el) {
  textFontSize = parseInt(el.dataset.size);
  var chips = document.querySelectorAll('.ts-chip');
  for (var ci = 0; ci < chips.length; ci++) chips[ci].classList.remove('active');
  el.classList.add('active');
  textIn.style.fontSize = textFontSize + 'px';
}

function openTextBox(pos) {
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var left = pos.x;
  var top  = pos.y;
  if (left + 200 > vw) left = vw - 200;
  if (left < 10) left = 10;
  if (top + 200 > vh * 0.65) top = Math.max(20, pos.y - 230);
  textBox.style.left = left + 'px';
  textBox.style.top  = top + 'px';
  textBox.style.display = 'block';
  textIn.style.fontSize = textFontSize + 'px';
  textIn.value = '';
  // 取消选中已选文字节点
  deselectTextNode();
  setTimeout(function() { textIn.focus(); }, 80);
}

function confirmText() {
  var text = textIn.value.trim();
  if (!text) { cancelText(); return; }

  // 在文字层创建可拖动DOM节点
  var node = document.createElement('div');
  node.className = 'text-node';
  node.style.left = state.textPos.x + 'px';
  node.style.top  = state.textPos.y + 'px';
  node.style.fontSize  = textFontSize + 'px';
  node.style.color     = state.textColor;
  node.style.fontWeight = 'bold';

  // 文字内容放入独立 span，避免 textContent 读到删除按钮
  var textSpan = document.createElement('span');
  textSpan.className = 'text-node-content';
  textSpan.style.whiteSpace = 'pre-wrap';
  textSpan.textContent = text;
  node.appendChild(textSpan);

  // 删除按钮
  var delBtn = document.createElement('i');
  delBtn.className = 'text-node-del';
  delBtn.textContent = '\u00d7';
  delBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    node.parentNode && node.parentNode.removeChild(node);
    selectedTextNode = null;
  });
  node.appendChild(delBtn);

  // 点击选中
  node.addEventListener('mousedown', function(e) {
    e.stopPropagation();
    selectTextNode(node);
    startDragNode(e, node);
  });
  node.addEventListener('touchstart', function(e) {
    e.stopPropagation();
    selectTextNode(node);
    startDragNode(e, node);
  }, { passive: false });

  textLayer.appendChild(node);
  selectTextNode(node);
  cancelText();
}

function cancelText() {
  textBox.style.display = 'none';
  textIn.blur();
}

// ── 文字节点选中/取消 ──
function selectTextNode(node) {
  deselectTextNode();
  selectedTextNode = node;
  node.classList.add('selected');
}

function deselectTextNode() {
  if (selectedTextNode) {
    selectedTextNode.classList.remove('selected');
    selectedTextNode = null;
  }
}

// 点击画布空白处取消选中
canvas.addEventListener('mousedown', function() { deselectTextNode(); });
canvas.addEventListener('touchstart', function() { deselectTextNode(); }, { passive: true });

// ── 文字节点拖动 ──
function startDragNode(e, node) {
  var isTouch = e.type === 'touchstart';
  var startX = isTouch ? e.touches[0].clientX : e.clientX;
  var startY = isTouch ? e.touches[0].clientY : e.clientY;
  var origLeft = parseInt(node.style.left) || 0;
  var origTop  = parseInt(node.style.top)  || 0;

  function onDragMove(ev) {
    ev.preventDefault();
    var cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
    var cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
    var dx = cx - startX;
    var dy = cy - startY;
    var wrapRect = wrap.getBoundingClientRect();
    var newLeft = Math.max(0, Math.min(origLeft + dx, wrapRect.width - 20));
    var newTop  = Math.max(0, Math.min(origTop  + dy, wrapRect.height - 20));
    node.style.left = newLeft + 'px';
    node.style.top  = newTop  + 'px';
  }

  function onDragEnd() {
    document.removeEventListener('mousemove', onDragMove);
    document.removeEventListener('mouseup',   onDragEnd);
    document.removeEventListener('touchmove', onDragMove);
    document.removeEventListener('touchend',  onDragEnd);
  }

  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup',   onDragEnd);
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('touchend',  onDragEnd);
}

// ── 撤销 ──
function pushUndo() {
  undoStack.push(canvas.toDataURL());
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}

function undo() {
  if (undoStack.length === 0) {
    showToast('已经是最初状态了', '#f59e0b');
    return;
  }
  var snap = undoStack.pop();
  var w = wrap.clientWidth;
  var h = wrap.clientHeight;
  drawBackground(state.bgStyle);
  var undoImg = new Image();
  undoImg.onload = function() { ctx.drawImage(undoImg, 0, 0, w, h); };
  undoImg.src = snap;
}

// ── 清空 ──
function clearCanvas() {
  if (!confirm('确定清空当前画布？')) return;
  pushUndo();
  drawBackground(state.bgStyle);
  // 清空文字层
  if (textLayer) textLayer.innerHTML = '';
  selectedTextNode = null;
}

// ── 把文字层合并绘制到临时canvas ──
function getMergedDataURL() {
  // 先把文字节点渲染到画布上
  deselectTextNode(); // 隐藏选中边框
  var nodes = textLayer ? textLayer.querySelectorAll('.text-node') : [];
  if (nodes.length > 0) {
    ctx.save();
    for (var ni = 0; ni < nodes.length; ni++) {
      var nd = nodes[ni];
      var nx = parseInt(nd.style.left) || 0;
      var ny = parseInt(nd.style.top)  || 0;
      var nfs = parseInt(nd.style.fontSize) || 16;
      ctx.font = 'bold ' + nfs + 'px Inter, -apple-system, sans-serif';
      ctx.fillStyle = nd.style.color || '#1e293b';
      ctx.textBaseline = 'top';
      ctx.globalAlpha = 1;
      // 读取 span 内容，避免包含删除按钮的文字
      var contentSpan = nd.querySelector('.text-node-content');
      var rawText = contentSpan ? contentSpan.textContent : nd.firstChild ? nd.firstChild.textContent : '';
      var lines = rawText.split('\n');
      for (var li = 0; li < lines.length; li++) {
        ctx.fillText(lines[li], nx, ny + li * nfs * 1.4);
      }
    }
    ctx.restore();
    // 清空文字层（已合并到canvas）
    textLayer.innerHTML = '';
    selectedTextNode = null;
  }
  return canvas.toDataURL('image/png');
}

// ── 保存为图片 ──
function saveImage() {
  saveCurrent();
  var dataURL = getMergedDataURL();
  var a = document.createElement('a');
  var ts = new Date().toISOString().slice(0,16).replace('T','-').replace(':','');
  a.download = 'TripLite-涂鸦-' + ts + '.png';
  a.href = dataURL;
  a.click();
  showToast('✅ 图片已保存\n长按相册图片可分享', '#059669');
}

// ── 分享（Web Share API 或 fallback 下载）──
function shareImage() {
  saveCurrent();
  var dataURL = getMergedDataURL();

  if (navigator.share && navigator.canShare) {
    try {
      fetch(dataURL).then(function(r) { return r.blob(); }).then(function(blob) {
        var file = new File([blob], 'TripLite涂鸦.png', { type: 'image/png' });
        if (navigator.canShare({ files: [file] })) {
          navigator.share({ files: [file], title: 'TripLite涂鸦记录' })['catch'](function() { doFallbackShare(dataURL); });
          return;
        }
        doFallbackShare(dataURL);
      })['catch'](function() { doFallbackShare(dataURL); });
      return;
    } catch(e) {}
  }
  doFallbackShare(dataURL);
}

function doFallbackShare(dataURL) {
  // Fallback：弹出图片让用户长按保存（替换document.write，兼容所有浏览器）
  try {
    var win = window.open('', '_blank');
    if (win) {
      // 用 DOM 操作替代 document.write，避免部分浏览器拦截
      win.document.title = '涂鸦图片 - 长按保存';
      var html = win.document.documentElement || win.document.createElement('html');
      win.document.open();
      win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head><body style="margin:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;"><img src="' + dataURL + '" style="max-width:100%;max-height:90vh;object-fit:contain;" /><p style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:white;font-size:14px;background:rgba(0,0,0,0.7);padding:8px 16px;border-radius:20px;white-space:nowrap;">长按图片 → 保存到相册</p></body></html>');
      win.document.close();
    } else {
      saveImage();
    }
  } catch(e) {
    // window.open 被拦截（如iOS Safari在非用户手势中）
    saveImage();
  }
}

// ── Toast 提示 ──
function showToast(msg, color) {
  if (!color) color = '#059669';
  var t = document.getElementById('save-toast');
  t.innerHTML = msg.replace('\n','<br>');
  t.style.background = color;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

// ── 多页面板 ──
function togglePagesPanel() {
  var panel = document.getElementById('pages-panel');
  var ov = document.getElementById('overlay');
  if (panel.style.display === 'block') {
    closeAllPanels();
  } else {
    closeAllPanels(false);
    buildPageThumbs();
    panel.style.display = 'block';
    ov.style.display = 'block';
  }
}

function buildPageThumbs() {
  saveCurrent();
  var grid = document.getElementById('pageThumbGrid');
  grid.innerHTML = '';

  for (var pti = 0; pti < pages.length; pti++) {
    (function(snap, idx) {
      var d = document.createElement('div');
      d.className = 'page-thumb' + (idx === currentPage ? ' active' : '');

      if (snap) {
        var img = document.createElement('img');
        img.src = snap;
        d.appendChild(img);
      } else {
        d.style.background = '#f1f5f9';
      }

      var label = document.createElement('div');
      label.className = 'page-thumb-label';
      label.textContent = '\u7b2c' + (idx+1) + '\u9875';
      d.appendChild(label);

      if (pages.length > 1) {
        var del = document.createElement('div');
        del.className = 'page-thumb-del';
        del.innerHTML = '\u2715';
        del.onclick = function(e) { e.stopPropagation(); deletePage(idx); };
        d.appendChild(del);
      }

      d.onclick = function() { loadPage(idx); closeAllPanels(); };
      grid.appendChild(d);
    })(pages[pti], pti);
  }

  // 新增按钮
  if (pages.length < MAX_PAGES) {
    var add = document.createElement('div');
    add.className = 'add-page-btn';
    add.innerHTML = '<i class="fas fa-plus"></i><span>\u65b0\u5efa</span>';
    add.onclick = addPage;
    grid.appendChild(add);
  }
}

function addPage() {
  saveCurrent();
  pages.push(null);
  loadPage(pages.length - 1);
  closeAllPanels();
  showToast('\ud83d\udcc4 \u5df2\u65b0\u5efa\u7b2c ' + pages.length + ' \u9875', '#3b82f6');
}

function deletePage(idx) {
  if (pages.length <= 1) return;
  if (!confirm('\u5220\u9664\u7b2c ' + (idx+1) + ' \u9875\uff1f')) return;
  pages.splice(idx, 1);
  var newIdx = Math.min(currentPage, pages.length - 1);
  loadPage(newIdx);
  buildPageThumbs();
}

// ── 背景面板 ──
function toggleBgPanel() {
  var panel = document.getElementById('bg-panel');
  var ov = document.getElementById('overlay');
  if (panel.style.display === 'block') {
    closeAllPanels();
  } else {
    closeAllPanels(false);
    panel.style.display = 'block';
    ov.style.display = 'block';
  }
}

function closeAllPanels(hideOv) {
  if (hideOv === undefined) hideOv = true;
  document.getElementById('bg-panel').style.display = 'none';
  document.getElementById('pages-panel').style.display = 'none';
  if (hideOv) document.getElementById('overlay').style.display = 'none';
}

// ── 自动保存（退出前）──
window.addEventListener('beforeunload', saveCurrent);
window.addEventListener('pagehide', saveCurrent);

// ── 启动 ──
init();
</script>

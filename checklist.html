  <script>
    // 存储管理
    var STORAGE_KEY = 'triplite_checklist_v2';
    var DEPARTURE_DATE = '2026-04-26'; // 出发日期

    function loadCheckedState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch(e) { return {}; }
    }
    
    function saveCheckedState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    
    var checkedState = loadCheckedState();
    var showOnlyUnchecked = false;
    var openGroups = {};
    var activePhase = 'all'; // 'all' | 'before' | 'during'

    // ── 计算倒计时 ──
    function getCountdown() {
      var now = new Date();
      var dep = new Date(DEPARTURE_DATE);
      dep.setHours(0, 0, 0, 0);
      var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      var diff = Math.ceil((dep - today) / (1000 * 60 * 60 * 24));
      return diff;
    }

    // ── 倒计时文案 ──
    function getCountdownBadge() {
      var days = getCountdown();
      if (days > 30) return { text: '出发还有 ' + days + ' 天', color: 'var(--text-secondary)', bg: 'var(--bg-card)' };
      if (days > 7)  return { text: '出发还有 ' + days + ' 天', color: '#1d4ed8', bg: '#dbeafe' };
      if (days > 3)  return { text: '⚡ 出发还有 ' + days + ' 天，抓紧准备！', color: '#b45309', bg: '#fef3c7' };
      if (days > 0)  return { text: '🔥 出发还有 ' + days + ' 天！最后冲刺！', color: '#dc2626', bg: '#fee2e2' };
      if (days === 0) return { text: '🎉 今天就要出发了！出发！', color: '#059669', bg: '#d1fae5' };
      return { text: '✈️ 旅途中，好好享受！', color: '#059669', bg: '#d1fae5' };
    }

    // ── 阶段说明 ──
    // phase: 'before7' = 提前1周前 | 'before3' = 提前3天内 | 'day0' = 出发当天 | 'during' = 途中随时
    function getPhaseLabel(phase) {
      var map = {
        'before7': { label: '出发前一周', color: 'blue', icon: '📅' },
        'before3': { label: '出发前3天', color: 'amber', icon: '⚡' },
        'day0':    { label: '出发当天', color: 'red',   icon: '🔥' },
        'during':  { label: '途中随时', color: 'green', icon: '✈️' }
      };
      return map[phase] || { label: phase, color: 'gray', icon: '📌' };
    }

    // ── 为每个 checklist item 加 phase 字段（从data.js数据扩展） ──
    var PHASE_MAP = {
      // 证件
      'passport': 'before7',
      'hk-macau-permit': 'before7',
      'passport-photo': 'before7',
      'flight-macau': 'before7',
      'flight-bkk': 'before7',
      'flight-return': 'before7',
      'hotel-macau': 'before7',
      'hotel-pattaya': 'before7',
      'hotel-bkk': 'before7',
      'travel-insurance': 'before7',
      'id-card': 'before7',
      // 入境
      'macau-entry': 'before7',
      'macau-departure': 'before3',
      'tdac': 'before3',
      'tdac-qr': 'before3',
      'thai-border-qa': 'before3',

      'customs-quota': 'before7',
      'pattaya-address': 'before3',
      'return-ticket': 'before3',
      'customs-limit': 'before3',
      // 网络
      'esim': 'before3',
      'grab': 'before7',
      'google-maps': 'before3',
      'translate-app': 'before3',
      'hotel-wifi': 'during',
      'emergency-number': 'before3',
      'emergency-contacts': 'before3',
      // 支付
      'rate-anchor': 'before7',
      'alipay-intl': 'before7',
      'visa-card': 'before7',
      'bank-notice': 'before7',
      'cash-baht': 'before3',
      'cash-mop': 'before7',
      'backup-card': 'before7',
      'exchange-rate': 'before7',
      // 行李
      'luggage-weight': 'before3',
      // App（出境前）
      'app-klook': 'before3',
      'app-weather': 'before3',
      // 安全
      'valuables-split': 'before7',
      'scam-awareness': 'before7',
      'water-safety': 'before7',
      'songthaew-usage': 'before7',
      'thai-ordering-phrases': 'before7',
      'dengue-protection': 'before7',
      'kohlan-valuables': 'before3',
      'tipping-guide': 'before7',
      // 行李
      'light-clothes': 'before7',
      'temple-outfit': 'before3',
      'sandals': 'before7',
      'sneakers': 'before7',
      'swimwear': 'before3',
      'snorkel-gear': 'before3',
      'sunscreen': 'before3',

      'hat': 'before7',

      'depart-day-check': 'day0',

      // App（出境前与途中）
      'app-grab': 'before7',
      'app-googlemaps': 'before7',
      'app-translate': 'before7',
      'app-booking': 'before7',
      'app-flightradar': 'before7',
      'app-bolt': 'before7',
      'app-grab-pass': 'during',

      'app-superrich': 'before7',
      'app-xe': 'before7',
      'app-triplite': 'before3',
      // 支付（补充）
      'tax-refund': 'before7'
    };

    function getTotalStats() {
      var total = 0, checked = 0, must = 0, mustDone = 0;
      var gi, group, ii, item;
      for (gi = 0; gi < CHECKLIST_DATA.length; gi++) {
        group = CHECKLIST_DATA[gi];
        for (ii = 0; ii < group.items.length; ii++) {
          item = group.items[ii];
          total++;
          if (checkedState[item.id]) checked++;
          if (item.must) {
            must++;
            if (checkedState[item.id]) mustDone++;
          }
        }
      }
      return { total: total, checked: checked, must: must, mustDone: mustDone };
    }
    
    function getGroupStats(group) {
      var total = group.items.length;
      var checked = 0;
      for (var ii = 0; ii < group.items.length; ii++) {
        if (checkedState[group.items[ii].id]) checked++;
      }
      return { total: total, checked: checked };
    }

    // 阶段过滤：只显示当前阶段最相关的项
    function getActiveItems(group) {
      var result, ii, item, p;
      if (activePhase === 'all') return group.items;
      result = [];
      if (activePhase === 'before') {
        for (ii = 0; ii < group.items.length; ii++) {
          item = group.items[ii];
          p = PHASE_MAP[item.id] || 'before7';
          if (p === 'before7' || p === 'before3') result.push(item);
        }
        return result;
      }
      if (activePhase === 'day0') {
        for (ii = 0; ii < group.items.length; ii++) {
          item = group.items[ii];
          if ((PHASE_MAP[item.id] || 'before7') === 'day0') result.push(item);
        }
        return result;
      }
      if (activePhase === 'during') {
        for (ii = 0; ii < group.items.length; ii++) {
          item = group.items[ii];
          if ((PHASE_MAP[item.id] || 'before7') === 'during') result.push(item);
        }
        return result;
      }
      return group.items;
    }

      var stats = getTotalStats();
      var pct = Math.round((stats.checked / stats.total) * 100);
      var countdown = getCountdown();
      var badge = getCountdownBadge();
      
      // 初始化所有分组为展开

      for (gi_init = 0; gi_init < CHECKLIST_DATA.length; gi_init++) {

        if (openGroups[g_init.id] === undefined) openGroups[g_init.id] = true;

        + '<button onclick="resetAll()" class="btn btn-secondary" style="flex:1;font-size:12px;padding:8px;"><i class="fas fa-redo"></i> 重置全部</button>'
        + '</div></div>'
        + '<div class="city-tabs" style="margin-bottom:12px;" id="phase-tabs">'

        + '<div style="font-size:12px;font-weight:700;color:#7e22ce;margin-bottom:6px;">\uD83E\uDD9F 驱蚊（热带登革热风险）</div>'
        + '<div style="display:flex;flex-direction:column;gap:5px;">'
        + '<div style="display:flex;gap:6px;align-items:flex-start;font-size:12px;color:#581c87;"><span style="color:#a855f7;font-size:10px;margin-top:4px;">●</span>驱蚊液 DEET 30%+ · 黄昏后必用，防登革热</div>'
        + '<div style="display:flex;gap:6px;align-items:flex-start;font-size:12px;color:#581c87;"><span style="color:#a855f7;font-size:10px;margin-top:4px;">●</span>蚊虫叮咬止痒膏 · 清凉油或芦荟胶</div>'
        + '</div></div>'
        + '<div style="display:flex;align-items:center;gap:8px;background:#fef3c7;border-radius:8px;padding:8px 10px;">'
        + '<span style="font-size:16px;">\uD83D\uDCA1</span>'
        + '<span style="font-size:12px;color:#92400e;">查看<a href="weather.html" style="color:#b45309;font-weight:700;">天气页面</a>获取逐日天气详情和防暑防晒完整指南 →</span>'
        + '</div></div>'
        + '<div class="safe-bottom"></div>';
      
      renderGroups();

      // 动态填充动态内容
      var bannerEl2 = document.getElementById('countdown-banner');
      if (bannerEl2) {
        bannerEl2.style.background = badge.bg;
        bannerEl2.style.color = badge.color;
        bannerEl2.textContent = badge.text;
      }
      updateProgressDisplay();

      // phase tabs 选中
      var phaseTabs2 = document.getElementById('phase-tabs');
      if (phaseTabs2) {
        var tabBtns2 = phaseTabs2.querySelectorAll('.city-chip');
        var phaseOrder2 = ['all', 'before', 'day0', 'during'];
        for (var ti2 = 0; ti2 < tabBtns2.length; ti2++) {
          if (phaseOrder2[ti2] === activePhase) tabBtns2[ti2].classList.add('active');
          else tabBtns2[ti2].classList.remove('active');
        }
      }

      // 只看未完成按钮文字
      var uncheckedBtnEl = document.getElementById('unchecked-btn-text');
      if (uncheckedBtnEl) uncheckedBtnEl.textContent = showOnlyUnchecked ? '显示全部' : '只看未完成';

      // 阶段提示
      var phaseHintEl2 = document.getElementById('phase-hint');
      if (phaseHintEl2) {
        if (activePhase !== 'all') {
          var hintIcon2 = activePhase === 'before' ? '📅' : activePhase === 'day0' ? '🔥' : '✈️';
          var hintTitle2 = activePhase === 'before' ? '出发前需完成的项目' : activePhase === 'day0' ? '出发当天早上逐项检查' : '途中随时可处理的项目';
          var hintText2 = activePhase === 'before' ? '出发前一周：完成订单/证件/App准备；出发前3天：完成TDAC/网络/着装确认' : activePhase === 'day0' ? '出门前最后检查：充电宝、护照在随身包、机票截图、TDAC截图、插头转换器' : '如酒店WiFi确认，可在入住后立即处理';
          phaseHintEl2.innerHTML = '<div class="alert-card info" style="margin-bottom:12px;"><div class="alert-icon">' + hintIcon2 + '</div><div class="alert-content"><div class="alert-title">' + hintTitle2 + '</div><div class="alert-text">' + hintText2 + '</div></div></div>';
        } else { phaseHintEl2.innerHTML = ''; }
      }

      // 必做项提醒
      var mustAlertEl2 = document.getElementById('must-do-alert');
      if (mustAlertEl2) {
        if (stats.mustDone < stats.must) {
          mustAlertEl2.innerHTML = '<div class="alert-card danger" style="margin-bottom:12px;"><div class="alert-icon">🚨</div><div class="alert-content"><div class="alert-title">还有 ' + (stats.must - stats.mustDone) + ' 项必做事项未完成</div><div class="alert-text">特别注意：TDAC入境卡须在4/27抵达泰国前72小时内（建议4/25–4/26）填写，过早会失效；护照有效期需在5/3之后还剩6个月以上（即2026年11月3日之后）。</div></div></div>';
        } else {
          mustAlertEl2.innerHTML = '<div class="alert-card success" style="margin-bottom:12px;"><div class="alert-icon">🎉</div><div class="alert-content"><div class="alert-title">所有必做事项已完成！</div><div class="alert-text">你已经准备好了，出发吧！祝旅途愉快！</div></div></div>';
        }
      }
    }

    function setPhase(phase, btn) {
      activePhase = phase;
      var allChips2 = document.querySelectorAll('.city-chip');
      for (var ci2 = 0; ci2 < allChips2.length; ci2++) allChips2[ci2].classList.remove('active');
      if (btn) btn.classList.add('active');
      renderChecklist();
    }
    
    function renderGroups() {
      var container = document.getElementById('checklistGroups');
      if (!container) return;
      
      var html = '';
      var i_g, group, gStats, isOpen, isDone, itemsToShow, filtered, fi, itemsHtml, ii;
      for (i_g = 0; i_g < CHECKLIST_DATA.length; i_g++) {
        group = CHECKLIST_DATA[i_g];
        gStats = getGroupStats(group);
        isOpen = openGroups[group.id];
        isDone = gStats.checked === gStats.total;
        
        itemsToShow = getActiveItems(group);
        if (showOnlyUnchecked) {
          filtered = [];
          for (fi = 0; fi < itemsToShow.length; fi++) {
            if (!checkedState[itemsToShow[fi].id]) filtered.push(itemsToShow[fi]);
          }
          itemsToShow = filtered;
        }
        
        if (itemsToShow.length === 0) continue;
        
        itemsHtml = '';
        for (ii = 0; ii < itemsToShow.length; ii++) {
          itemsHtml += renderCheckItem(itemsToShow[ii]);
        }
        html += '<div class="checklist-group" data-group-id="' + group.id + '">'
          + '<div class="checklist-group-header" onclick="toggleGroup(\'' + group.id + '\')">'
          + '<div class="checklist-group-title"><span style="font-size:18px;">' + group.icon + '</span><span>' + group.title + '</span></div>'
          + '<div style="display:flex;align-items:center;gap:8px;">'
          + '<span class="checklist-progress' + (isDone ? ' done' : '') + '">' + gStats.checked + '/' + gStats.total + '</span>'
          + '<i class="fas fa-chevron-' + (isOpen ? 'up' : 'down') + '" style="color:var(--text-muted);font-size:12px;"></i>'
          + '</div></div>'
          + '<div class="checklist-items' + (isOpen ? ' open' : '') + '" id="group_' + group.id + '">'
          + itemsHtml + '</div></div>';
      }
      container.innerHTML = html;
    }
    
    // 描述文字中注入超链接
    function injectDescLinks(text) {
      return text
        .replace(/tdac\.immigration\.go\.th/g, '<a href="https://tdac.immigration.go.th" target="_blank" rel="noopener" onclick="event.stopPropagation();" style="color:var(--primary-light);font-weight:600;">tdac.immigration.go.th ↗</a>')
        .replace(/royalgrandpalace\.th/g, '<a href="http://www.royalgrandpalace.th" target="_blank" rel="noopener" onclick="event.stopPropagation();" style="color:var(--primary-light);font-weight:600;">royalgrandpalace.th ↗</a>')
        .replace(/bts\.co\.th\/eng\/routemap/g, '<a href="https://www.bts.co.th/eng/routemap" target="_blank" rel="noopener" onclick="event.stopPropagation();" style="color:var(--primary-light);font-weight:600;">BTS路线图 ↗</a>');
    }

    function renderCheckItem(item) {
      var isChecked = checkedState[item.id];
      var phase = PHASE_MAP[item.id] || 'before7';
      var phaseInfo = getPhaseLabel(phase);
      var descHtml = '';
      if (item.desc) {
        var processedDesc = injectDescLinks(item.desc);
        var short = item.desc.length > 100;
        var preview = short ? item.desc.substring(0, 100) + '…' : item.desc;
        var previewProcessed = injectDescLinks(preview);
        if (!short) {
          descHtml = '<div class="check-desc" style="white-space:pre-line;">' + processedDesc + '</div>';
        } else {
          descHtml = '<div class="check-desc" style="white-space:pre-line;">'
            + '<span class="desc-preview">' + previewProcessed + '</span>'
            + '<span class="desc-full" style="display:none;">' + processedDesc + '</span>'
            + '<span class="desc-toggle" onclick="event.stopPropagation();toggleDesc(this)" style="color:var(--primary-light);font-size:11px;cursor:pointer;font-weight:600;"> 展开▾</span>'
            + '</div>';
        }
      }
      var tagHtml = item.must ? '<span class="check-badge must">必须</span>' : (item.tag ? '<span class="check-badge tip">' + item.tag + '</span>' : '');
      return '<div class="check-item' + (isChecked ? ' checked' : '') + (item.must ? ' must-item' : '') + '"'
        + ' data-item-id="' + item.id + '"'
        + ' onclick="toggleItem(\'' + item.id + '\')">'
        + '<div class="check-box">' + (isChecked ? '<i class="fas fa-check"></i>' : '') + '</div>'
        + '<div style="flex:1;min-width:0;">'
        + '<div style="display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;">'
        + '<span class="check-name">' + item.name + '</span>'
        + tagHtml
        + '<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:var(--bg);color:var(--text-secondary);font-weight:600;">' + phaseInfo.icon + ' ' + phaseInfo.label + '</span>'
        + '</div>'
        + descHtml
        + '</div></div>';
    }
    
    function toggleDesc(btn) {
      var descDiv = null;
      if (btn.closest) {
        descDiv = btn.closest('.check-desc');
      } else {
        var p = btn.parentNode;
        while (p && !p.classList.contains('check-desc')) p = p.parentNode;
        descDiv = p;
      }
      if (!descDiv) return;
      var preview = descDiv.querySelector('.desc-preview');
      var full = descDiv.querySelector('.desc-full');
      if (!preview || !full) return;
      var isExpanded = full.style.display !== 'none';
      preview.style.display = isExpanded ? '' : 'none';
      full.style.display = isExpanded ? 'none' : '';
      btn.textContent = isExpanded ? ' 展开▾' : ' 收起▴';
    }
    
    function toggleItem(itemId) {
      checkedState[itemId] = !checkedState[itemId];
      saveCheckedState(checkedState);
      
      // 精准更新单个 item DOM，避免重建全页
      var el = document.querySelector('[data-item-id="' + itemId + '"]');
      if (el) {
        var isChecked = checkedState[itemId];
        if (isChecked) {
          el.classList.add('checked');
        } else {
          el.classList.remove('checked');
        }
        var box = el.querySelector('.check-box');
        if (box) box.innerHTML = isChecked ? '<i class="fas fa-check"></i>' : '';
        
        // 更新分组进度
        var groupEl = el.closest ? el.closest('.checklist-group') : null;
        if (!groupEl) { // 对不支持closest的旧浏览器的fallback
          var p = el.parentNode;
          while (p && !p.classList.contains('checklist-group')) p = p.parentNode;
          groupEl = p;
        }
        if (groupEl) {
          var groupId = groupEl.dataset.groupId;
          var group = null;
          for (var gi = 0; gi < CHECKLIST_DATA.length; gi++) { if (CHECKLIST_DATA[gi].id === groupId) { group = CHECKLIST_DATA[gi]; break; } }
          if (group) {
            var s = getGroupStats(group);
            var prog = groupEl.querySelector('.checklist-progress');
            if (prog) {
              prog.textContent = s.checked + '/' + s.total;
              if (s.checked === s.total) prog.classList.add('done');
              else prog.classList.remove('done');
            }
          }
        }
        
        // 更新全局进度条（轻量更新）
        updateProgressDisplay();
        
        // 如果只看未完成模式，勾选后隐藏该item
        if (showOnlyUnchecked && checkedState[itemId]) {
          el.style.display = 'none';
        }
      } else {
        // 找不到DOM元素时降级为全量渲染
        renderChecklist();
      }
    }
    
    function updateProgressDisplay() {
      var stats = getTotalStats();
      var pct = Math.round((stats.checked / stats.total) * 100);
      var pctEl = document.querySelector('[data-pct]');
      if (pctEl) pctEl.textContent = pct + '%';
      var fill = document.querySelector('.progress-fill');
      if (fill) {
        fill.style.width = pct + '%';
        fill.style.background = pct === 100 ? 'var(--success)' : 'linear-gradient(90deg,var(--primary),var(--primary-light))';
      }
      var mustEl = document.querySelector('[data-must-progress]');
      if (mustEl) mustEl.textContent = '必做项 ' + stats.mustDone + '/' + stats.must;
      var allEl = document.querySelector('[data-all-progress]');
      if (allEl) allEl.textContent = '全部项 ' + stats.checked + '/' + stats.total;
    }
    
    function toggleGroup(groupId) {
      openGroups[groupId] = !openGroups[groupId];
      var itemsEl = document.getElementById('group_' + groupId);
      if (itemsEl) {
        if (openGroups[groupId]) {
          itemsEl.classList.add('open');
        } else {
          itemsEl.classList.remove('open');
        }
        var groupEl = itemsEl.parentNode;
        while (groupEl && !groupEl.classList.contains('checklist-group')) groupEl = groupEl.parentNode;
        var icon = groupEl ? (groupEl.querySelector('.fa-chevron-up') || groupEl.querySelector('.fa-chevron-down')) : null;
        if (icon) {
          if (openGroups[groupId]) { icon.classList.add('fa-chevron-up'); icon.classList.remove('fa-chevron-down'); }
          else { icon.classList.add('fa-chevron-down'); icon.classList.remove('fa-chevron-up'); }
        }
      }
    }
    
    function toggleShowUnchecked() {
      showOnlyUnchecked = !showOnlyUnchecked;
      renderChecklist(); // 此操作需要重建（显示/隐藏逻辑复杂）
    }
    
    function resetAll() {
      if (confirm('确定重置所有勾选状态吗？')) {
        checkedState = {};
        saveCheckedState(checkedState);
        renderChecklist();
      }
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      renderChecklist();
      var now = new Date();
      var headerDate = document.getElementById('headerDate');
      if (headerDate) headerDate.textContent = (now.getMonth()+1) + '月' + now.getDate() + '日';
    });
  </script>

  <!-- 涂鸦悬浮按钮 -->
  <a href="note.html" class="note-fab" title="涂鸦记录">✏️</a>
</body>
</html>

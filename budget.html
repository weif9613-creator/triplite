<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a3a5c">
  <title>费用预算 · TripLite</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── 预算专用样式 ── */
    .budget-hero {
      background: linear-gradient(135deg, #1a3a5c 0%, #0369a1 100%);
      border-radius: 20px;
      padding: 20px 18px;
      margin-bottom: 14px;
      color: white;
    }
    .budget-hero-title {
      font-size: 13px;
      font-weight: 600;
      opacity: 0.8;
      margin-bottom: 6px;
    }
    .budget-total-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .budget-total-cny {
      font-size: 36px;
      font-weight: 900;
      line-height: 1;
    }
    .budget-total-sub {
      font-size: 12px;
      opacity: 0.75;
      margin-bottom: 3px;
    }
    .budget-per-day {
      text-align: right;
    }
    .budget-per-day-num {
      font-size: 20px;
      font-weight: 800;
    }
    .budget-per-day-label {
      font-size: 11px;
      opacity: 0.75;
    }
    .budget-cat-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .budget-cat-chip {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      backdrop-filter: blur(4px);
    }

    /* ── 汇率计算器 ── */
    .rate-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 8px rgba(0,0,0,.06);
    }
    .rate-card-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .rate-inputs {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
    }
    .rate-input-wrap {
      background: var(--bg-page);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .rate-input-label {
      font-size: 10px;
      color: var(--text-tertiary);
      font-weight: 600;
      margin-bottom: 3px;
    }
    .rate-input-field {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 20px;
      font-weight: 800;
      color: var(--text-primary);
      outline: none;
    }
    .rate-input-field::-webkit-inner-spin-button { display: none; }
    .rate-arrow {
      font-size: 20px;
      color: var(--text-tertiary);
      text-align: center;
    }
    .rate-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .rate-chip {
      border: none;
      background: var(--bg-page);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .rate-chip.active, .rate-chip:hover {
      background: var(--primary);
      color: white;
    }
    .rate-quick-calc {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .rate-quick-btn {
      background: var(--bg-page);
      border: none;
      border-radius: 12px;
      padding: 9px 6px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .rate-quick-btn:active { background: var(--primary-light); }
    .rate-quick-btn-val {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-primary);
    }
    .rate-quick-btn-label {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 1px;
    }

    /* ── 每日卡片 ── */
    .day-budget-card {
      background: var(--bg-card);
      border-radius: 16px;
      margin-bottom: 10px;
      overflow: hidden;
      box-shadow: 0 1px 8px rgba(0,0,0,.06);
    }
    .dbc-header {
      display: flex;
      align-items: center;
      padding: 14px 16px 10px;
      cursor: pointer;
      gap: 10px;
      user-select: none;
    }
    .dbc-emoji { font-size: 22px; flex-shrink: 0; }
    .dbc-info { flex: 1; min-width: 0; }
    .dbc-title { font-size: 14px; font-weight: 800; color: var(--text-primary); }
    .dbc-sub { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
    .dbc-amount-wrap { text-align: right; flex-shrink: 0; }
    .dbc-amount { font-size: 18px; font-weight: 900; color: var(--primary); }
    .dbc-amount-cny { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
    .dbc-toggle { font-size: 12px; color: var(--text-tertiary); margin-left: 6px; flex-shrink: 0; }
    .dbc-body { padding: 0 16px 14px; }
    .dbc-row {
      display: flex;
      align-items: center;
      padding: 7px 0;
      border-top: 1px solid var(--border);
    }
    .dbc-row:first-child { border-top: none; }
    .dbc-row-icon { width: 28px; font-size: 14px; flex-shrink: 0; }
    .dbc-row-name { flex: 1; font-size: 13px; color: var(--text-secondary); }
    .dbc-row-val {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .dbc-row-note { font-size: 10px; color: var(--text-tertiary); text-align: right; }
    .dbc-divider { height: 1px; background: var(--border); margin: 6px 0; }
    .dbc-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 8px;
    }
    .dbc-total-label { font-size: 12px; font-weight: 700; color: var(--text-secondary); }
    .dbc-total-val { font-size: 16px; font-weight: 900; color: var(--primary); }
    .dbc-total-cny { font-size: 11px; color: var(--text-tertiary); }

    /* ── 分类汇总 ── */
    .cat-summary-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 8px rgba(0,0,0,.06);
    }
    .cat-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .cat-bar-label {
      width: 60px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .cat-bar-track {
      flex: 1;
      background: var(--bg-page);
      border-radius: 6px;
      height: 10px;
      overflow: hidden;
    }
    .cat-bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s ease;
    }
    .cat-bar-val {
      width: 60px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: right;
      flex-shrink: 0;
    }

    /* ── 预算 vs 实际 切换 ── */
    .tab-switch {
      display: flex;
      background: var(--bg-page);
      border-radius: 12px;
      padding: 3px;
      gap: 3px;
      margin-bottom: 14px;
    }
    .tab-switch-btn {
      flex: 1;
      border: none;
      background: transparent;
      border-radius: 9px;
      padding: 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-switch-btn.active {
      background: white;
      color: var(--primary);
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }

    /* ── 城市小计 ── */
    .city-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .city-sum-card {
      background: var(--bg-card);
      border-radius: 14px;
      padding: 12px 10px;
      text-align: center;
      box-shadow: 0 1px 6px rgba(0,0,0,.05);
    }
    .city-sum-emoji { font-size: 20px; margin-bottom: 4px; }
    .city-sum-name { font-size: 11px; color: var(--text-secondary); font-weight: 600; margin-bottom: 4px; }
    .city-sum-val { font-size: 16px; font-weight: 900; color: var(--text-primary); }
    .city-sum-cny { font-size: 10px; color: var(--text-tertiary); margin-top: 1px; }

    /* ── Tips ── */
    .saving-tip-card {
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border-left: 4px solid #16a34a;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .saving-tip-title { font-size: 13px; font-weight: 800; color: #15803d; margin-bottom: 4px; }
    .saving-tip-text { font-size: 12px; color: #166534; line-height: 1.6; }
  </style>
</head>

  function toRMB(amount, currency) {
    return amount * (currentRates[currency] || 1);
  }

  function fmtRMB(val) {
    return val >= 10 ? `¥${Math.round(val)}` : `¥${val.toFixed(1)}`;
  }

  function fmtLocal(val, currency) {
    if (currency === 'CNY') return `¥${Math.round(val)}`;
    if (currency === 'THB') return `฿${Math.round(val)}`;
    if (currency === 'MOP') return `${Math.round(val)}P`;
    return `${val}`;
  }

  // ── 计算单日范围（CNY） ──
  function calcDayTotal(day) {
    let minCNY = 0, maxCNY = 0;
    day.items.forEach(it => {
      minCNY += toRMB(it.min, it.currency);
      maxCNY += toRMB(it.max, it.currency);
    });
    return { minCNY, maxCNY, midCNY: (minCNY + maxCNY) / 2 };
  }

  // ── 计算分类汇总（CNY） ──
  function calcCatTotals() {
    const cats = {};
    Object.keys(CAT_CONFIG).forEach(k => { cats[k] = { minCNY: 0, maxCNY: 0 }; });
    BUDGET_DAYS.forEach(day => {
      day.items.forEach(it => {
        if (cats[it.cat]) {
          cats[it.cat].minCNY += toRMB(it.min, it.currency);
          cats[it.cat].maxCNY += toRMB(it.max, it.currency);
        }
      });
    });
    return cats;
  }

  // ── 计算城市小计 ──
  function calcCityTotals() {
    const cities = { macau: { min: 0, max: 0 }, pattaya: { min: 0, max: 0 }, bangkok: { min: 0, max: 0 }, return: { min: 0, max: 0 } };
    BUDGET_DAYS.forEach(day => {
      const code = day.cityCode;
      if (!cities[code]) return;
      const { minCNY, maxCNY } = calcDayTotal(day);
      cities[code].min += minCNY;
      cities[code].max += maxCNY;
    });
    return cities;
  }

  // ── 折叠状态 ──
  const openDays = {};
  BUDGET_DAYS.forEach(d => { openDays[d.id] = false; });

  function toggleDay(id) {
    openDays[id] = !openDays[id];
    const body = document.getElementById(`dbc-body-${id}`);
    const icon = document.getElementById(`dbc-icon-${id}`);
    if (body) body.style.display = openDays[id] ? 'block' : 'none';
    if (icon) icon.textContent = openDays[id] ? '▲' : '▼';
  }

  // ── 汇率计算器 ──
  let calcCurrency = 'THB'; // 当前计算货币

  function updateCalc(from, val) {
    const numVal = parseFloat(val) || 0;
    if (from === 'local') {
      const cny = numVal * currentRates[calcCurrency];
      const el = document.getElementById('calc-cny');
      if (el) el.value = cny > 0 ? cny.toFixed(1) : '';
    } else {
      const local = numVal / currentRates[calcCurrency];
      const el = document.getElementById('calc-local');
      if (el) el.value = local > 0 ? local.toFixed(0) : '';
    }
    updateQuickCalc();
  }

  function setCalcCurrency(cur) {
    calcCurrency = cur;
    document.querySelectorAll('.rate-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.cur === cur);
    });
    const label = document.getElementById('calc-local-label');
    if (label) label.textContent = cur === 'THB' ? '泰铢 (฿)' : '澳门元 (P)';
    document.getElementById('calc-local').value = '';
    document.getElementById('calc-cny').value = '';
    updateQuickCalc();
  }

  function updateQuickCalc() {
    const quicks = [100, 200, 500];
    quicks.forEach((v, i) => {
      const el = document.getElementById(`qc-${i}`);
      if (el) el.innerHTML = `<div class="rate-quick-btn-val">${fmtRMB(v * currentRates[calcCurrency])}</div><div class="rate-quick-btn-label">${v}${calcCurrency === 'THB' ? '฿' : 'P'}</div>`;
    });
    // 更新主汇率显示
    const rateEl = document.getElementById('current-rate-display');
    if (rateEl) {
      const unit = calcCurrency === 'THB' ? '฿' : 'P';
      rateEl.textContent = `当前汇率：100${unit} = ¥${(currentRates[calcCurrency] * 100).toFixed(1)}`;
    }
  }

  // ── 主渲染 ──
  function renderBudget() {
    const main = document.getElementById('appMain');

    // 计算全程总预算
    let totalMin = 0, totalMax = 0;
    BUDGET_DAYS.forEach(d => {
      const t = calcDayTotal(d);
      totalMin += t.minCNY;
      totalMax += t.maxCNY;
    });
    const totalMid = (totalMin + totalMax) / 2;

    const cats = calcCatTotals();
    const catMaxMax = Math.max(...Object.values(cats).map(c => c.maxCNY));
    const cityTotals = calcCityTotals();

    main.innerHTML = `
      <div class="page-header">
        <div class="page-header-title">💰 费用预算</div>
        <div class="page-header-sub">8天预估 · 2人参考（可根据实际调整）</div>
      </div>

      <!-- 总预算 Hero -->
      <div class="budget-hero">
        <div class="budget-hero-title">💰 全程预估总费用（1人）</div>
        <div class="budget-total-row">
          <div>
            <div class="budget-total-cny">¥${Math.round(totalMid).toLocaleString()}</div>
            <div class="budget-total-sub">区间：¥${Math.round(totalMin).toLocaleString()} ~ ¥${Math.round(totalMax).toLocaleString()}</div>
          </div>
          <div class="budget-per-day">
            <div class="budget-per-day-num">¥${Math.round(totalMid/8)}<span style="font-size:13px;font-weight:600;">/天</span></div>
            <div class="budget-per-day-label">日均参考</div>
          </div>
        </div>
        <div class="budget-cat-row">
          ${Object.entries(CAT_CONFIG).map(([k,v]) => {
            const c = cats[k];
            const mid = Math.round((c.minCNY + c.maxCNY) / 2);
            return `<div class="budget-cat-chip">${v.icon} ${v.label} ¥${mid}</div>`;
          }).join('')}
        </div>
      </div>

      <!-- 城市小计 -->
      <div class="city-summary">
        <div class="city-sum-card">
          <div class="city-sum-emoji">🎰</div>
          <div class="city-sum-name">澳门</div>
          <div class="city-sum-val">¥${Math.round((cityTotals.macau.min+cityTotals.macau.max)/2)}</div>
          <div class="city-sum-cny">1天</div>
        </div>
        <div class="city-sum-card">
          <div class="city-sum-emoji">🏖️</div>
          <div class="city-sum-name">芭提雅</div>
          <div class="city-sum-val">¥${Math.round((cityTotals.pattaya.min+cityTotals.pattaya.max)/2)}</div>
          <div class="city-sum-cny">2天</div>
        </div>
        <div class="city-sum-card">
          <div class="city-sum-emoji">🏙️</div>
          <div class="city-sum-name">曼谷</div>
          <div class="city-sum-val">¥${Math.round((cityTotals.bangkok.min+cityTotals.bangkok.max)/2)}</div>
          <div class="city-sum-cny">4天</div>
        </div>
      </div>

      <!-- 汇率计算器 -->
      <div class="rate-card">
        <div class="rate-card-title"><i class="fas fa-calculator" style="color:var(--primary);"></i> 快速汇率计算器</div>
        <div class="rate-chips">
          <button class="rate-chip active" data-cur="THB" onclick="setCalcCurrency('THB')">泰铢 ฿</button>
          <button class="rate-chip" data-cur="MOP" onclick="setCalcCurrency('MOP')">澳门元 P</button>
        </div>
        <div class="rate-inputs" style="margin-top:10px;">
          <div class="rate-input-wrap">
            <div class="rate-input-label" id="calc-local-label">泰铢 (฿)</div>
            <input type="number" class="rate-input-field" id="calc-local" placeholder="输入金额"
              oninput="updateCalc('local', this.value)">
          </div>
          <div class="rate-arrow">⇌</div>
          <div class="rate-input-wrap">
            <div class="rate-input-label">人民币 (¥)</div>
            <input type="number" class="rate-input-field" id="calc-cny" placeholder="换算结果"
              oninput="updateCalc('cny', this.value)">
          </div>
        </div>
        <div id="current-rate-display" style="text-align:center;font-size:11px;color:var(--text-tertiary);margin-top:8px;"></div>
        <div class="rate-quick-calc">
          <button class="rate-quick-btn" id="qc-0" onclick="document.getElementById('calc-local').value=100;updateCalc('local',100)"></button>
          <button class="rate-quick-btn" id="qc-1" onclick="document.getElementById('calc-local').value=200;updateCalc('local',200)"></button>
          <button class="rate-quick-btn" id="qc-2" onclick="document.getElementById('calc-local').value=500;updateCalc('local',500)"></button>
        </div>
      </div>

      <!-- 分类费用条形图 -->
      <div class="cat-summary-card">
        <div class="card-title" style="margin-bottom:14px;"><span class="icon">📊</span>分类费用占比</div>
        ${Object.entries(CAT_CONFIG).map(([k, v]) => {
          const c = cats[k];
          const mid = (c.minCNY + c.maxCNY) / 2;
          const pct = catMaxMax > 0 ? Math.round(mid / catMaxMax * 100) : 0;
          return `
            <div class="cat-bar-row">
              <div class="cat-bar-label">${v.icon} ${v.label}</div>
              <div class="cat-bar-track">
                <div class="cat-bar-fill" style="width:${pct}%;background:${v.color};"></div>
              </div>
              <div class="cat-bar-val">¥${Math.round(mid)}</div>
            </div>`;
        }).join('')}
      </div>

      <!-- 逐日明细 -->
      <div class="section-label">逐日费用明细</div>
      <div id="days-list">
        ${BUDGET_DAYS.map(day => renderDayCard(day)).join('')}
      </div>

      <!-- 省钱攻略 -->
      <div class="section-label" style="margin-top:4px;">💡 省钱小贴士</div>

      <div class="saving-tip-card">
        <div class="saving-tip-title">🚕 交通：Bolt比Grab便宜15–35%</div>
        <div class="saving-tip-text">安装Bolt后同时开Grab对比价，日常市区短途用双条车（20–30฿）最省。曼谷高峰期叫车贵，地铁+步行可省下200–400฿。</div>
      </div>

      <div class="saving-tip-card">
        <div class="saving-tip-title">💴 换汇：SuperRich比机场省5–10%</div>
        <div class="saving-tip-text">先从国内带少量泰铢应急，到曼谷后在SuperRich（市区D4/D5多网点）换大额。1万泰铢在SuperRich比机场能多换约200–400元人民币。</div>
      </div>

      <div class="saving-tip-card">
        <div class="saving-tip-title">🍱 餐饮：Terminal 21 B1 美食广场 50–100฿/人</div>
        <div class="saving-tip-text">Terminal 21 B1美食广场是曼谷最便宜的高性价比美食聚集地，泰式炒饭/炒河粉/绿咖喱人均50–80฿，比外面同档次餐厅便宜40%。</div>
      </div>

      <div class="saving-tip-card">
        <div class="saving-tip-title">🛒 购物：Big C/Makro/Lotus's比7-Eleven便宜</div>
        <div class="saving-tip-text">日常用品（防晒/药品/零食）在Big C超市采购，比7-Eleven便宜20–40%。离走前在Siam Paragon B1集中扫货，免税申请TAX REFUND可退7%。</div>
      </div>

      <div class="saving-tip-card" style="background:linear-gradient(135deg,#fffbeb,#fef3c7);border-left-color:#d97706;">
        <div class="saving-tip-title" style="color:#92400e;">⚠️ 容易超支的陷阱</div>
        <div class="saving-tip-text" style="color:#78350f;">• 格兰岛水上活动被坑（香蕉船报价前先问清单价）<br>• 机场换汇汇率差（1万฿多损失200–400元）<br>• 未打表的出租车（直接拒绝，换一辆）<br>• 行李超重（提前15kg内整合，超重费每KG约200฿）</div>
      </div>

      <div class="safe-bottom"></div>
    `;

    // 初始化快速计算
    updateQuickCalc();
  }

  function renderDayCard(day) {
    const { minCNY, maxCNY, midCNY } = calcDayTotal(day);
    const isOpen = openDays[day.id];

    // 按类别分组项目
    const grouped = {};
    day.items.forEach(it => {
      if (!grouped[it.cat]) grouped[it.cat] = [];
      grouped[it.cat].push(it);
    });

    return `
      <div class="day-budget-card">
        <div class="dbc-header" onclick="toggleDay(${day.id})">
          <div class="dbc-emoji">${day.emoji}</div>
          <div class="dbc-info">
            <div class="dbc-title">Day${day.id} · ${day.date}</div>
            <div class="dbc-sub">${day.city}</div>
          </div>
          <div class="dbc-amount-wrap">
            <div class="dbc-amount">${fmtRMB(midCNY)}</div>
            <div class="dbc-amount-cny">${fmtRMB(minCNY)}~${fmtRMB(maxCNY)}</div>
          </div>
          <div class="dbc-toggle" id="dbc-icon-${day.id}">${isOpen ? '▲' : '▼'}</div>
        </div>
        <div class="dbc-body" id="dbc-body-${day.id}" style="display:${isOpen ? 'block' : 'none'};">
          ${Object.entries(grouped).map(([cat, items]) => `
            ${items.map(it => `
              <div class="dbc-row">
                <div class="dbc-row-icon">${CAT_CONFIG[cat]?.icon || '📌'}</div>
                <div style="flex:1;">
                  <div class="dbc-row-name">${it.name}</div>
                  ${it.note ? `<div style="font-size:10px;color:var(--text-tertiary);">${it.note}</div>` : ''}
                </div>
                <div style="text-align:right;">
                  <div class="dbc-row-val">${fmtLocal(it.min, it.currency)} ~ ${fmtLocal(it.max, it.currency)}</div>
                  <div class="dbc-row-note">≈ ${fmtRMB(toRMB(it.min, it.currency))}~${fmtRMB(toRMB(it.max, it.currency))}</div>
                </div>
              </div>`).join('')}
          `).join('')}
          <div class="dbc-divider"></div>
          <div class="dbc-total-row">
            <div class="dbc-total-label">Day${day.id} 小计</div>
            <div style="text-align:right;">
              <div class="dbc-total-val">${fmtRMB(midCNY)}</div>
              <div class="dbc-total-cny">${fmtRMB(minCNY)} ~ ${fmtRMB(maxCNY)}</div>
            </div>
          </div>
        </div>
      </div>`;
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderBudget();
    const now = new Date();
    const el = document.getElementById('headerDate');
    if (el) el.textContent = `${now.getMonth()+1}月${now.getDate()}日`;
  });
  </script>

  <!-- 涂鸦悬浮按钮 -->
  <a href="note.html" class="note-fab" title="涂鸦记录"><i class="fas fa-pen-nib"></i></a>
</body>
</html>

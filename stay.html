<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TripLite">
  <meta name="format-detection" content="telephone=no,email=no,address=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>住宿建议 · TripLite</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"></noscript>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    .dist-row { display:flex; flex-wrap:wrap; gap:6px; margin:8px 0 4px; }
    .dist-chip {
      font-size:11px; padding:3px 8px; border-radius:20px;
      background:var(--bg); color:var(--text-secondary);
      border:1px solid var(--border); display:flex; align-items:center; gap:4px;
    }
    .dist-chip .d-icon { font-size:12px; }
    .dist-chip.walk { border-color:#10b981; color:#065f46; background:#d1fae5; }
    .dist-chip.taxi { border-color:#3b82f6; color:#1e40af; background:#dbeafe; }
    .hotel-nearby-title {
      font-size:11px; font-weight:700; color:var(--text-secondary);
      text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; margin-top:10px;
    }
    .nearby-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:6px;
    }
    .nearby-item {
      background:var(--bg); border-radius:10px; padding:8px 10px;
      font-size:11px; line-height:1.5;
    }
    .nearby-item .nearby-name { font-weight:700; font-size:12px; margin-bottom:2px; }
    .nearby-item .nearby-dist { color:var(--text-secondary); }
    .hotel-rank-badge {
      position:absolute; top:-6px; right:12px;
      font-size:11px; font-weight:700; padding:2px 10px;
      border-radius:20px; color:white;
    }
    .hotel-card { position:relative; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-icon">✈️</span>
        <span class="brand-name">TripLite</span>
      </div>
      <div class="header-meta" id="headerDate"></div>
    </div>
  </header>

  <main class="app-main" id="appMain"></main>

  <nav class="bottom-nav">
    <a href="index.html"    class="nav-item"><i class="fas fa-home"></i><span>首页</span></a>
    <a href="trip.html"     class="nav-item"><i class="fas fa-route"></i><span>行程</span></a>
    <a href="map.html"      class="nav-item"><i class="fas fa-map-marker-alt"></i><span>地图</span></a>
    <a href="checklist.html" class="nav-item"><i class="fas fa-check-square"></i><span>清单</span></a>
    <a href="weather.html"  class="nav-item"><i class="fas fa-cloud-sun"></i><span>天气</span></a>
    <a href="emergency.html" class="nav-item"><i class="fas fa-shield-alt"></i><span>应急</span></a>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    var currentStayCity = 'macau';

    // ── 渲染住宿页 ──
    function renderStayPage() {
      var main = document.getElementById('appMain');
      if (!main) return;

      // 总览Banner
      var overviewHtml =
        '<div class="page-header">'
        + '<div class="page-header-title">🏨 住宿推荐</div>'
        + '<div class="page-header-sub">精选性价比酒店 · 携程一键预订 · ¥300–500预算</div>'
        + '</div>'
        + '<a href="hotel-plan-b.html" style="display:flex;align-items:center;justify-content:space-between;padding:13px 16px;margin-bottom:12px;background:linear-gradient(135deg,#f0fdf4,#eff6ff);border:1px solid #bfdbfe;border-radius:14px;text-decoration:none;color:#1a3a5c;">'
        + '<div>'
        + '<div style="font-size:13px;font-weight:800;">📋 方案B · 独立精选推荐</div>'
        + '<div style="font-size:12px;color:#4b5563;margin-top:2px;">OZO / NH / Holiday Inn / Furama · 携程直达链接</div>'
        + '</div>'
        + '<span style="font-size:18px;">→</span>'
        + '</a>'
        + '<div class="card" style="margin-bottom:12px;background:linear-gradient(135deg,#1e3a5f,#1e40af);padding:16px;">'
        + '<div style="color:rgba(255,255,255,0.7);font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:10px;">📍 全程住宿安排</div>'
        + '<div style="display:flex;flex-direction:column;gap:8px;">'
        + _overviewRow('4/26', '1晚', '🎰', '澳门 · 氹仔艺居酒店', '✅ 已确认', '#86efac')
        + _overviewRow('4/27–4/28', '2晚', '🏖️', '芭提雅 · Central 2nd Road', '待订', '#fde68a')
        + _overviewRow('4/29–5/1', '3晚', '🏙️', '曼谷 · Asok/Sukhumvit', '待订', '#fde68a')
        + '</div>'
        + '<div style="margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.15);font-size:11px;color:rgba(255,255,255,0.65);line-height:1.6;">'
        + '💡 以下酒店均已人工筛选验证：真实可订、评分8.0+、对应行程地点步行圈内。<strong style="color:rgba(255,255,255,0.9);">携程（ctrip.com）为国内最优先预订渠道</strong>，支持中文客服，付款方便。'
        + '</div>'
        + '</div>';

      // 城市 Tabs
      var tabsHtml = '<div class="city-tabs" id="stay-city-tabs-inner"></div>';

      // 城市内容容器
      var contentHtml = '<div id="stayCityContent"></div>';

      // 通用原则
      var tipsHtml =
        '<div class="card" style="margin-top:4px;">'
        + '<div class="card-title" style="margin-bottom:10px;"><span class="icon">💡</span>订酒店通用原则</div>'
        + '<div style="display:flex;flex-direction:column;gap:0;">'
        + _tipRow('📍', '位置 > 价格', '宁可多花50元住交通方便的地方，省去打车折腾时间。曼谷必须BTS/MRT步行10分钟内。')
        + _tipRow('📅', '提前订 · 选免费取消', '五一前后（4/26–5/3）是高峰期，越早越便宜。优先选"可免费取消"房型，万一行程变动不损失订金。')
        + _tipRow('🏨', '连住不换', '芭提雅2晚+曼谷3晚，不要中途换酒店，每次搬行李浪费半天游玩时间。')
        + _tipRow('📱', '携程 = 国内首选', '携程（ctrip.com）支持支付宝/微信付款，中文客服，退改政策清晰，国内出境游最稳选择。')
        + '</div>'
        + '</div>'
        + '<div class="safe-bottom"></div>';

      main.innerHTML = overviewHtml + tabsHtml + contentHtml + tipsHtml;

      // 渲染 Tabs
      var innerTabsEl = document.getElementById('stay-city-tabs-inner');
      if (innerTabsEl && typeof STAY_DATA !== 'undefined') {
        var chipsHtml = '';
        for (var ic = 0; ic < STAY_DATA.cities.length; ic++) {
          var c = STAY_DATA.cities[ic];
          chipsHtml += '<button class="city-chip' + (ic === 0 ? ' active' : '') + '" onclick="switchStayCity(\'' + c.id + '\', this)">' + c.emoji + ' ' + c.name + '</button>';
        }
        innerTabsEl.innerHTML = chipsHtml;
      }
      switchStayCity('macau', document.querySelector('.city-chip'));
    }

    function _overviewRow(dates, nights, emoji, name, status, statusColor) {
      return '<div style="display:flex;align-items:center;gap:8px;">'
        + '<div style="background:rgba(255,255,255,0.12);padding:3px 8px;border-radius:16px;font-size:10px;color:white;white-space:nowrap;">' + dates + '</div>'
        + '<div style="background:rgba(255,255,255,0.08);padding:3px 7px;border-radius:16px;font-size:10px;color:rgba(255,255,255,0.7);white-space:nowrap;">' + nights + '</div>'
        + '<div style="flex:1;font-size:13px;color:white;font-weight:600;">' + emoji + ' ' + name + '</div>'
        + '<div style="font-size:10px;font-weight:700;color:' + statusColor + ';white-space:nowrap;">' + status + '</div>'
        + '</div>';
    }

    function _tipRow(icon, title, desc) {
      return '<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start;">'
        + '<div style="font-size:18px;flex-shrink:0;margin-top:1px;">' + icon + '</div>'
        + '<div><div style="font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:2px;">' + title + '</div>'
        + '<div style="font-size:12px;color:var(--text-secondary);line-height:1.6;">' + desc + '</div></div>'
        + '</div>';
    }

    // ── 切换城市 ──
    function switchStayCity(cityId, btn) {
      currentStayCity = cityId;
      var allChips = document.querySelectorAll('.city-chip');
      for (var i = 0; i < allChips.length; i++) allChips[i].classList.remove('active');
      if (btn) btn.classList.add('active');

      var cityData = null;
      if (typeof STAY_DATA !== 'undefined') {
        for (var j = 0; j < STAY_DATA.cities.length; j++) {
          if (STAY_DATA.cities[j].id === cityId) { cityData = STAY_DATA.cities[j]; break; }
        }
      }
      var content = document.getElementById('stayCityContent');
      if (!content || !cityData) return;

      // ── 城市头部 ──
      var headerHtml =
        '<div class="hero-card" style="margin-bottom:14px;">'
        + '<div style="font-size:11px;opacity:0.7;margin-bottom:4px;font-weight:600;">' + cityData.dates + ' · ' + cityData.stayNights + '晚</div>'
        + '<div style="font-size:19px;font-weight:800;margin-bottom:6px;">' + cityData.emoji + ' ' + cityData.name + ' · ' + cityData.area + '</div>'
        + '<div style="font-size:12px;opacity:0.82;line-height:1.7;margin-bottom:10px;">' + cityData.reason + '</div>'
        + '<div class="hero-tags">'
        + '<span class="hero-tag">预算 ' + cityData.budgetRange + '</span>'
        + '<span class="hero-tag">' + cityData.stayNights + '晚</span>'
        + '</div>'
        + '</div>';

      // ── 日程参考 ──
      var schedHtml = '';
      if (cityData.schedule && cityData.schedule.length) {
        var rows = '';
        var schedColors = ['#0ea5e9','#10b981','#a855f7'];
        var schedTColors = ['#0369a1','#059669','#7c3aed'];
        for (var s = 0; s < cityData.schedule.length; s++) {
          rows += '<div style="background:var(--bg-card);border-radius:12px;padding:11px 14px;margin-bottom:8px;border-left:4px solid ' + (schedColors[s] || '#0ea5e9') + ';">'
            + '<div style="font-size:11px;font-weight:800;color:' + (schedTColors[s] || '#0369a1') + ';margin-bottom:5px;">' + cityData.schedule[s].time + '</div>'
            + '<div style="font-size:12px;color:var(--text-primary);line-height:1.8;">' + cityData.schedule[s].plan.replace(/→/g,'<span style="color:#94a3b8;margin:0 2px;">→</span>') + '</div>'
            + '</div>';
        }
        schedHtml = '<div class="section-label">📅 住这里 · 每天怎么走</div>'
          + '<div style="margin-bottom:14px;">' + rows + '</div>';
      }

      // ── 酒店列表 ──
      var hotelsHtml =
        '<div class="section-label">🏨 精选酒店（' + cityData.hotels.length + '家对比 · 均已验证）</div>'
        + '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;background:var(--bg);padding:8px 10px;border-radius:8px;">'
        + '📌 价格为五一期间参考均价，以携程实时显示为准。<strong>务必选"免费取消"房型</strong>。'
        + '</div>';

      for (var hi = 0; hi < cityData.hotels.length; hi++) {
        hotelsHtml += renderHotelCard(cityData.hotels[hi], hi);
      }

      content.innerHTML = headerHtml + schedHtml + hotelsHtml + getCitySpecialNote(cityId);
    }

    // ── 酒店卡片 ──
    function renderHotelCard(hotel, idx) {
      var rankBg   = ['#059669','#d97706','#6b7280'][idx] || '#6b7280';
      var rankText = ['⭐ 首推','👍 备选','💰 省钱'][idx] || '';
      var tagBg    = ['#dbeafe','#fef3c7','#f1f5f9'][idx] || '#f1f5f9';
      var tagColor = ['#1d4ed8','#92400e','#374151'][idx] || '#374151';

      // tags
      var tagsHtml = '';
      for (var ti = 0; ti < hotel.tags.length; ti++) {
        tagsHtml += '<span style="font-size:10px;padding:2px 7px;border-radius:20px;background:' + tagBg + ';color:' + tagColor + ';font-weight:600;white-space:nowrap;">' + hotel.tags[ti] + '</span>';
      }

      // pros
      var prosHtml = '';
      for (var pi = 0; pi < hotel.pros.length; pi++) {
        prosHtml += '<div style="font-size:12px;color:var(--text-primary);padding:4px 0;border-bottom:1px solid var(--border);line-height:1.5;">' + hotel.pros[pi] + '</div>';
      }

      // why（选择理由）
      var whyHtml = hotel.why
        ? '<div style="background:#f0fdf4;border-left:3px solid #10b981;border-radius:0 8px 8px 0;padding:9px 12px;margin:10px 0;font-size:12px;color:#065f46;line-height:1.6;"><strong>✅ 为什么选它：</strong>' + hotel.why + '</div>'
        : '';

      // route
      var routeHtml = hotel.route
        ? '<div style="background:#f0f9ff;border-left:3px solid #0ea5e9;border-radius:0 8px 8px 0;padding:9px 12px;margin:10px 0;"><div style="font-size:11px;font-weight:800;color:#0369a1;margin-bottom:5px;">🗺️ 从这里出发怎么走</div><div style="font-size:12px;color:#1e3a5f;line-height:1.8;white-space:pre-line;">' + hotel.route + '</div></div>'
        : '';

      // warning
      var warnHtml = hotel.warning
        ? '<div style="background:#fef3c7;border-left:3px solid #f59e0b;border-radius:0 8px 8px 0;padding:8px 12px;margin:8px 0;font-size:12px;color:#92400e;line-height:1.5;"><span style="font-weight:700;">⚠️ 注意：</span>' + hotel.warning + '</div>'
        : '';

      // 携程直达按钮 + 搜索按钮
      var ctripDirectBtn = hotel.ctrip
        ? '<a href="' + hotel.ctrip + '" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 14px;border-radius:10px;background:#0066b3;color:white;font-size:13px;font-weight:800;text-decoration:none;letter-spacing:0.3px;">'
          + '<span style="font-size:15px;">🛒</span> 携程直达此酒店</a>'
        : '';
      var ctripSearchBtn = hotel.ctripSearch
        ? '<a href="' + hotel.ctripSearch + '" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 14px;border-radius:10px;background:#e0f0ff;color:#0066b3;font-size:12px;font-weight:700;text-decoration:none;">'
          + '<span>🔍</span> 携程搜索同类房源</a>'
        : '';
      var bookingBtn = hotel.booking
        ? '<a href="' + hotel.booking + '" target="_blank" style="flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:9px;border-radius:10px;background:#f1f5f9;color:#1e293b;font-size:12px;font-weight:600;text-decoration:none;"><span>🌐</span>Booking</a>'
        : '';
      var agodaBtn = hotel.agoda
        ? '<a href="' + hotel.agoda + '" target="_blank" style="flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:9px;border-radius:10px;background:#f1f5f9;color:#1e293b;font-size:12px;font-weight:600;text-decoration:none;"><span>🌐</span>Agoda</a>'
        : '';

      return '<div class="hotel-card" style="margin-bottom:18px;position:relative;">'
        // 徽章
        + '<span style="position:absolute;top:-8px;right:12px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;color:white;background:' + rankBg + ';z-index:1;">' + rankText + '</span>'
        // 顶部：名称+价格
        + '<div class="hotel-top">'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-start;padding-top:6px;">'
        + '<div style="flex:1;min-width:0;">'
        + '<div class="hotel-name" style="font-size:15px;padding-right:6px;">' + hotel.name + '</div>'
        + '<div class="hotel-area" style="margin-top:3px;"><i class="fas fa-map-marker-alt" style="color:#ef4444;font-size:10px;margin-right:3px;"></i>' + hotel.area + '</div>'
        + '</div>'
        + '<div style="text-align:right;flex-shrink:0;margin-left:8px;">'
        + '<div style="font-size:16px;font-weight:800;color:#0f172a;">' + hotel.price + '</div>'
        + '<div style="font-size:10px;color:var(--text-muted);">/晚</div>'
        + '<div style="margin-top:3px;display:flex;align-items:center;justify-content:flex-end;gap:3px;">'
        + '<i class="fas fa-star" style="color:#f59e0b;font-size:10px;"></i>'
        + '<span style="font-size:12px;font-weight:700;color:#0f172a;">' + hotel.score + '</span>'
        + '<span style="font-size:10px;color:var(--text-muted);">' + (hotel.scoreLabel || '') + '</span>'
        + '</div>'
        + '</div>'
        + '</div>'
        // tags
        + '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;">' + tagsHtml + '</div>'
        + '</div>'
        // 正文
        + '<div class="hotel-body">'
        + whyHtml
        + '<div style="margin-bottom:4px;">' + prosHtml + '</div>'
        + routeHtml + warnHtml
        // 预订区
        + '<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);">'
        + '<div style="font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:0.5px;margin-bottom:8px;">📱 预订渠道（国内首选携程）</div>'
        + '<div style="display:flex;flex-direction:column;gap:7px;">'
        + ctripDirectBtn
        + ctripSearchBtn
        + '<div style="display:flex;gap:7px;">' + bookingBtn + agodaBtn + '</div>'
        + '</div>'
        + '<div style="margin-top:8px;font-size:10px;color:var(--text-muted);line-height:1.6;background:var(--bg);padding:6px 10px;border-radius:8px;">'
        + '💡 <strong>携程直达</strong>：含日期已填好，直接看该酒店价格。<strong>携程搜索</strong>：看同区域其他同类房源对比。Booking/Agoda 可比价，境外信用卡付款方便。'
        + '</div>'
        + '</div>'
        + '</div>'
        + '</div>';
    }

    // ── 城市特别提示 ──
    function getCitySpecialNote(cityId) {
      if (cityId === 'macau') {
        return '<div class="alert-card success" style="margin-top:4px;">'
          + '<div class="alert-icon">✅</div>'
          + '<div class="alert-content">'
          + '<div class="alert-title">澳门已定艺居酒店，今天这样走</div>'
          + '<div class="alert-text">① 落地→打的5分钟到艺居酒店放行李<br>② 步行15分钟或打的→官也街买手信<br>③ 官也街步行10分钟→龙环葡韵拍照<br>④ 打的回路氹城吃晚饭→22:30前回酒店休息</div>'
          + '</div></div>'
          + '<div class="alert-card warning" style="margin-top:8px;">'
          + '<div class="alert-icon">⏰</div>'
          + '<div class="alert-content">'
          + '<div class="alert-title">今晚22:30前必须休息</div>'
          + '<div class="alert-text">明天飞曼谷落地后直奔芭提雅，路途长。今晚不要熬夜逛威尼斯人，提前整理好明天出发材料（护照/TDAC截图/机票）。</div>'
          + '</div></div>';
      }
      if (cityId === 'pattaya') {
        return '<div class="alert-card info" style="margin-top:4px;">'
          + '<div class="alert-icon">🎟️</div>'
          + '<div class="alert-content">'
          + '<div class="alert-title">蒂芙尼秀 · 提前Klook购票</div>'
          + '<div class="alert-text">建议出发前在Klook购票，比现场便宜约100–200฿：<br>• Klook搜"Tiffany\'s Show Pattaya"→选4/28日期19:30场<br>• 票价约500–700฿/人（含1杯饮料）<br>• 演出约75分钟，从住宿Grab约50฿约5分钟到秀场</div>'
          + '</div></div>'
          + '<div class="alert-card warning" style="margin-top:8px;">'
          + '<div class="alert-icon">📅</div>'
          + '<div class="alert-content">'
          + '<div class="alert-title">4/29退房节奏安排</div>'

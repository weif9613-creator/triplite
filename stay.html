<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TripLite">
  <meta name="format-detection" content="telephone=no,email=no,address=no">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">

  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"></noscript>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    .dist-row { display:flex; flex-wrap:wrap; gap:6px; margin:8px 0 4px; }
    .dist-chip {
      font-size:11px; padding:3px 8px; border-radius:20px;
      background:var(--bg); color:var(--text-secondary);
      border:1px solid var(--border); display:flex; align-items:center; gap:4px;
    }
    .dist-chip .d-icon { font-size:12px; }
    .dist-chip.walk { border-color:#10b981; color:#065f46; background:#d1fae5; }
    .dist-chip.taxi { border-color:#3b82f6; color:#1e40af; background:#dbeafe; }
    .hotel-nearby-title {
      font-size:11px; font-weight:700; color:var(--text-secondary);
      text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; margin-top:10px;
    }
    .nearby-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:6px;
    }
    .nearby-item {
      background:var(--bg); border-radius:10px; padding:8px 10px;
      font-size:11px; line-height:1.5;
    }
    .nearby-item .nearby-name { font-weight:700; font-size:12px; margin-bottom:2px; }
    .nearby-item .nearby-dist { color:var(--text-secondary); }
    .hotel-rank-badge {
      position:absolute; top:-6px; right:12px;
      font-size:11px; font-weight:700; padding:2px 10px;
      border-radius:20px; color:white;
    }
    .hotel-card { position:relative; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-icon">✈️</span>
        <span class="brand-name">TripLite</span>
      </div>
      <div class="header-meta" id="headerDate"></div>
    </div>
  </header>

  <main class="app-main" id="appMain"></main>

  <nav class="bottom-nav">
    <a href="index.html"    class="nav-item"><i class="fas fa-home"></i><span>首页</span></a>
    <a href="trip.html"     class="nav-item"><i class="fas fa-route"></i><span>行程</span></a>
    <a href="map.html"      class="nav-item"><i class="fas fa-map-marker-alt"></i><span>地图</span></a>
    <a href="checklist.html" class="nav-item"><i class="fas fa-check-square"></i><span>清单</span></a>
    <a href="weather.html"  class="nav-item"><i class="fas fa-cloud-sun"></i><span>天气</span></a>
    <a href="emergency.html" class="nav-item"><i class="fas fa-shield-alt"></i><span>应急</span></a>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    var currentStayCity = 'macau';

    // 每家酒店的周边距离数据（补充）
    var HOTEL_NEARBY = {
      // ── 澳门 ──

        taxi:  ['澳门国际机场 打的约5分钟/约30–40澳门元', '氹仔旧城区 打的约8分钟', '路氹城美食广场 打的约10分钟'],

        note: '官也街购物最方便，预算有限的首选，把省下的钱留给泰国'

        taxi:  ['Bali Hai码头 双条车20฿约15分钟', '蒂芙尼秀场 Grab约50฿5分钟', '真理寺 Grab约60฿10分钟'],

        note: '泳池是加分项，格兰岛回来直接泡；去码头建议Grab省时间'

      },
      // ── 曼谷 ──
      'Grande Centre Point Terminal 21': {
        walk: ['Terminal 21商场 步行5分钟（B1美食广场50–100฿）', 'BTS Asok站 步行5分钟', 'MRT Sukhumvit站 步行3分钟', 'Health Land按摩 步行10分钟', '7-Eleven 步行1分钟'],
        taxi:  ['大皇宫 Grab约80–120฿（40–50分钟）', '唐人街Yaowarat Grab约50–70฿（20分钟）', 'Siam Paragon BTS约15分钟', 'Jodd Fairs夜市 Grab约20分钟', '素万那普机场 Grab约200–300฿（45–60分钟）'],
        note: '全程最优位置：双地铁交汇，商场/餐厅/按摩步行全解决'
      },
      'Mercure Bangkok Sukhumvit 11': {
        walk: ['BTS Nana站 步行5分钟', 'Soi 11街边餐厅 步行3分钟', '按摩店 步行5分钟', '7-Eleven 步行1分钟'],
        taxi:  ['Terminal 21 BTS 1站约5分钟', '大皇宫 Grab约80–120฿', '唐人街 Grab约50–70฿', 'Siam Paragon BTS约15分钟', '素万那普机场 Grab约200–300฿'],
        note: 'Soi 11周末夜间酒吧有噪音，浅睡眠者注意选楼层'
      },
      'ibis Bangkok Sukhumvit 4': {
        walk: ['BTS Nana站 步行3分钟', 'Soi 4/5餐厅 步行3分钟', '7-Eleven 步行1分钟'],
        taxi:  ['Terminal 21 BTS 1站约5分钟', '大皇宫 Grab约80–120฿', 'Siam Paragon BTS约15分钟', '素万那普机场 Grab约200–300฿'],
        note: 'Soi 4有酒吧区，位置佳但夜间较热闹，适合价格敏感旅行者'
      }
    };
    
    function renderStayPage() {
      var main = document.getElementById('appMain');
      if (!main) return;
      
      main.innerHTML = `
        <div class="page-header">
          <div class="page-header-title">🏨 住宿建议</div>
          <div class="page-header-sub">区域分析 · 候选酒店 · 距离说明</div>
        </div>
        
        <!-- 行程住宿概览 -->
        <div class="card" style="margin-bottom:12px;background:linear-gradient(135deg,#1e3a5f,#1e40af);">
          <div style="color:rgba(255,255,255,0.7);font-size:11px;font-weight:700;margin-bottom:8px;">📍 本次行程住宿安排</div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            <div style="display:flex;gap:8px;align-items:center;font-size:13px;color:white;">
              <span style="background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:20px;font-size:11px;white-space:nowrap;">4/26（1晚）</span>
              <span>🎰 澳门 · <strong style="color:#86efac;">✅ 艺居酒店（已定）</strong></span>
            </div>
            <div style="display:flex;gap:8px;align-items:center;font-size:13px;color:white;">
              <span style="background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:20px;font-size:11px;white-space:nowrap;">4/27–4/28（2晚）</span>
              <span>🏖️ 芭提雅 · Central Beach Road沿线</span>
            </div>
            <div style="display:flex;gap:8px;align-items:center;font-size:13px;color:white;">
              <span style="background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:20px;font-size:11px;white-space:nowrap;">4/29–5/1（3晚）</span>
              <span>🏙️ 曼谷 · Asok/Sukhumvit BTS步行圈</span>
            </div>
          </div>
        </div>

        <!-- 城市选择 -->
        <div class="city-tabs" id="stay-city-tabs-inner"></div>
        
        <!-- 城市内容 -->
        <div id="stayCityContent"></div>
        
        <!-- 住宿总体建议 -->
        <div class="card" style="margin-top:4px;">
          <div class="card-title" style="margin-bottom:10px;"><span class="icon">💡</span>住宿选择通用原则</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <div class="step-item am">
              <div class="step-content">
                <div class="step-title">位置 > 价格</div>
                <div class="step-desc">宁可多花50元住在交通方便的地方，省去每天打车折腾时间。尤其是曼谷，必须在BTS/MRT步行圈内。</div>
              </div>
            </div>
            <div class="step-item pm">
              <div class="step-content">
                <div class="step-title">连续住，不频繁换</div>
                <div class="step-desc">芭提雅连住2晚，曼谷连住3晚，不要频繁换酒店。每次搬行李都会消耗宝贵的游玩时间。</div>
              </div>
            </div>
            <div class="step-item night">
              <div class="step-content">
                <div class="step-title">提前预订，灵活取消</div>
                <div class="step-desc">国内用户推荐用 <strong>Trip.com（携程国际版）</strong>，境外可用 Booking 或 Agoda 比价。均优先选"免费取消"房型，方便调整行程。</div>
              </div>
            </div>
            <div class="step-item am">
              <div class="step-content">
                <div class="step-title">第一晚酒店要附近有餐厅</div>
                <div class="step-desc">抵达芭提雅（4/27）和曼谷（4/29）的第一晚，很可能已经很累。确认酒店步行5–10分钟内有餐厅或便利店。</div>
              </div>
            </div>
          </div>
        </div>
        
        <div class="safe-bottom"></div>
      `;
      
      // 动态生成城市tabs
      var innerTabsEl = document.getElementById('stay-city-tabs-inner');
      if (innerTabsEl && typeof STAY_DATA !== 'undefined' && STAY_DATA.cities) {
        var innerChipsHtml = '';
        for (var ic = 0; ic < STAY_DATA.cities.length; ic++) {
          var icc = STAY_DATA.cities[ic];
          innerChipsHtml += '<button class="city-chip' + (ic === 0 ? ' active' : '') + '" onclick="switchStayCity(\'' + icc.id + '\', this)">' + icc.emoji + ' ' + icc.name + '</button>';
        }
        innerTabsEl.innerHTML = innerChipsHtml;
      }
      switchStayCity('macau', document.querySelector('.city-chip'));
    }
    
    function switchStayCity(cityId, btn) {
      currentStayCity = cityId;
      
      var allChipsS = document.querySelectorAll('.city-chip');
      for (var csI = 0; csI < allChipsS.length; csI++) allChipsS[csI].classList.remove('active');
      if (btn) btn.classList.add('active');
      
      var cityData = null;
      if (typeof STAY_DATA !== 'undefined' && STAY_DATA.cities) {
        for (var sdI = 0; sdI < STAY_DATA.cities.length; sdI++) {
          if (STAY_DATA.cities[sdI].id === cityId) { cityData = STAY_DATA.cities[sdI]; break; }
        }
      }
      var content = document.getElementById('stayCityContent');
      if (!content || !cityData) return;

      // 澳门已定好，单独处理
      if (cityId === 'macau') {
        content.innerHTML = '<div class="hero-card" style="margin-bottom:14px;">'
          + '<div style="font-size:12px;opacity:0.75;margin-bottom:6px;font-weight:600;">4/26（1晚）· 氹仔岛</div>'
          + '<div style="font-size:20px;font-weight:800;margin-bottom:8px;">🎰 艺居酒店 · 已定好</div>'
          + '<div style="font-size:13px;opacity:0.85;line-height:1.7;">位于氹仔岛，距澳门国际机场约5分钟，下飞机直接到，明天早上出发也方便。今天只在氹仔活动，不过桥。</div>'
          + '</div>'
          + '<div class="alert-card success" style="margin-bottom:10px;">'
          + '<div class="alert-icon">✅</div>'
          + '<div class="alert-content">'
          + '<div class="alert-title">住宿已定，今天这样走</div>'
          + '<div class="alert-text">① 落地→打的5分钟到艺居酒店放行李<br>② 步行或打的→官也街买手信（步行15分钟）<br>③ 官也街步行10分钟→龙环葡韵拍照<br>④ 打的回路氹城吃晚饭→22:30前回酒店休息</div>'
          + '</div></div>'
          + '<div class="alert-card info">'
          + '<div class="alert-icon">✈️</div>'
          + '<div class="alert-content">'
          + '<div class="alert-title">明天出发提醒</div>'
          + '<div class="alert-text">艺居酒店距机场极近，步行或打的5分钟。出发前把护照、TDAC二维码截图、机票确认邮件放好随身包，提前1.5小时到机场。</div>'
          + '</div></div>';
        return;
      }
      
      // 构建内容 HTML
      var schedHtml2 = '';
      if (cityData.schedule) {
        var schedRows2 = '';
        for (var sci2 = 0; sci2 < cityData.schedule.length; sci2++) {
          var s2 = cityData.schedule[sci2];
          var sColor2 = sci2 === 0 ? '#0ea5e9' : '#10b981';
          var sTColor2 = sci2 === 0 ? '#0369a1' : '#059669';
          schedRows2 += '<div style="background:var(--bg-card);border-radius:12px;padding:12px 14px;margin-bottom:8px;border-left:4px solid ' + sColor2 + ';">'
            + '<div style="font-size:12px;font-weight:800;color:' + sTColor2 + ';margin-bottom:6px;">' + s2.time + '</div>'
            + '<div style="font-size:12px;color:var(--text-primary);line-height:1.9;">' + s2.plan.replace(/→/g, ' <span style="color:#94a3b8;">→</span> ') + '</div>'
            + '</div>';
        }
        schedHtml2 = '<div class="section-label">📅 住这里·每天怎么走</div><div style="margin-bottom:14px;">' + schedRows2 + '</div>';
      }
      var hotelsHtml2 = '';
      for (var hi2 = 0; hi2 < cityData.hotels.length; hi2++) {
        hotelsHtml2 += renderHotelCard(cityData.hotels[hi2], hi2, cityData.hotels.length);
      }
      content.innerHTML = '<div class="hero-card" style="margin-bottom:14px;">'
        + '<div style="font-size:12px;opacity:0.75;margin-bottom:6px;font-weight:600;">' + cityData.dates + ' · ' + cityData.stayNights + '晚</div>'
        + '<div style="font-size:20px;font-weight:800;margin-bottom:6px;">' + cityData.emoji + ' ' + cityData.name + ' · ' + cityData.area + '</div>'
        + '<div style="font-size:13px;opacity:0.85;line-height:1.7;margin-bottom:12px;">' + cityData.reason + '</div>'
        + '<div class="hero-tags"><span class="hero-tag">预算 ' + cityData.budgetRange + '</span><span class="hero-tag">' + cityData.stayNights + '晚</span></div>'
        + '</div>'
        + schedHtml2
        + '<div class="section-label">🏨 候选酒店（' + cityData.hotels.length + '家对比）</div>'
        + '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;">价格为参考均价，以预订平台实时为准。<strong>优先选"免费取消"房型。</strong></div>'
        + hotelsHtml2
        + getCitySpecialNote(cityId);
    }

    function renderHotelCard(hotel, idx, total) {
      var rankColors = ['#10b981', '#f59e0b', '#94a3b8'];
      var rankLabels = ['⭐ 首推', '👍 备选', '💰 省钱'];
      var rankColor = rankColors[idx] || '#94a3b8';
      var rankLabel = rankLabels[idx] || '';
      var tagClass = idx === 0 ? 'blue' : idx === 1 ? 'amber' : 'gray';
      var tagsHtml = '';
      for (var ti = 0; ti < hotel.tags.length; ti++) {
        tagsHtml += '<span class="tag ' + tagClass + '" style="font-size:11px;">' + hotel.tags[ti] + '</span>';
      }
      var prosHtml = '';
      for (var pi = 0; pi < hotel.pros.length; pi++) {
        prosHtml += '<div class="hotel-pro">' + hotel.pros[pi] + '</div>';
      }
      var routeHtml = hotel.route
        ? '<div style="background:#f0f9ff;border-radius:10px;padding:10px 12px;margin-top:10px;border-left:3px solid #0ea5e9;"><div style="font-size:11px;font-weight:800;color:#0369a1;margin-bottom:6px;">🗺️ 从这里出发怎么走</div><div style="font-size:12px;color:#1e3a5f;line-height:1.9;white-space:pre-line;">' + hotel.route + '</div></div>'
        : '';
      var warningHtml = hotel.warning
        ? '<div class="hotel-warning" style="margin-top:8px;"><span>⚠️</span><span>' + hotel.warning + '</span></div>'
        : '';
      var tripUrl = hotel.trip || 'https://www.trip.com/hotels/';
      return '<div class="hotel-card" style="margin-bottom:16px;">'
        + '<span class="hotel-rank-badge" style="background:' + rankColor + ';">' + rankLabel + '</span>'
        + '<div class="hotel-top"><div style="display:flex;justify-content:space-between;align-items:flex-start;padding-top:4px;">'
        + '<div style="flex:1;"><div class="hotel-name">' + hotel.name + '</div><div class="hotel-area"><i class="fas fa-map-marker-alt" style="color:var(--danger);font-size:11px;"></i> ' + hotel.area + '</div></div>'
        + '<div style="text-align:right;"><div class="hotel-price-row"><div class="hotel-price">' + hotel.price + '</div><div class="hotel-price-unit">/晚</div></div><div class="hotel-score"><i class="fas fa-star" style="font-size:11px;"></i> ' + hotel.score + '</div></div>'
        + '</div><div class="hotel-tags">' + tagsHtml + '</div></div>'
        + '<div class="hotel-body"><div class="hotel-pros">' + prosHtml + '</div>'
        + routeHtml + warningHtml
        + '<div style="font-size:11px;color:var(--text-secondary);margin-top:10px;background:var(--bg);padding:7px 10px;border-radius:8px;line-height:1.6;">🔍 以下为<strong>关键词搜索页</strong>，含日期筛选，打开后按名称找到酒店。<strong>国内优先用 Trip.com</strong>，境外用 Booking/Agoda 比价。</div>'
        + '<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px;">'
        + '<a href="' + tripUrl + '" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:10px;background:#006ECC;color:white;font-size:13px;font-weight:700;text-decoration:none;"><i class="fas fa-search" style="font-size:12px;"></i> Trip.com 搜索此酒店（国内可用）</a>'
        + '<div style="display:flex;gap:8px;">'
